<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR de mesa · HOSTELERO</title>
<style>
:root{--bg:#fbf7f0;--cream:#fffdf9;--ink:#2b2118;--soft:#9a8b7c;--line:#ece2d3;--terr:#b4532a;--gold:#c79a3f;--teal:#0f766e;--serif:'Georgia','Times New Roman',serif}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.bar{max-width:560px;margin:0 auto;padding:18px 18px 0;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.bar .f{flex:1;min-width:200px}
.bar label{display:block;font-size:12px;color:var(--soft);font-weight:700;margin-bottom:5px}
.bar input{width:100%;padding:12px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:15px}
.btn{padding:12px 18px;border-radius:11px;border:none;background:var(--terr);color:#fff;font-weight:800;font-size:14px;cursor:pointer}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.hint{max-width:560px;margin:8px auto 0;padding:0 18px;color:var(--soft);font-size:12px}
/* tarjeta imprimible */
.card{max-width:420px;margin:22px auto;background:var(--cream);border:1px solid var(--line);border-radius:24px;
  box-shadow:0 18px 44px rgba(74,49,28,.14);padding:34px 30px;text-align:center;position:relative;overflow:hidden}
.card .top{position:absolute;top:0;left:0;right:0;height:90px;background:linear-gradient(135deg,#0f766e,#0e2a32)}
.mk{position:relative;width:64px;height:64px;border-radius:18px;margin:18px auto 0;display:block;box-shadow:0 8px 20px rgba(0,0,0,.3)}
.card h1{font-family:var(--serif);font-size:27px;font-weight:700;margin:16px 0 2px}
.card .k{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.qrbox{margin:18px auto 14px;width:240px;height:240px;background:#fff;border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.qrbox img{width:216px;height:216px;display:block}
.card .scan{font-family:var(--serif);font-size:21px;font-weight:700;margin:4px 0 2px}
.card .sub{color:var(--soft);font-size:14px}
.card .res{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:var(--terr);color:#fff;font-weight:800;font-size:14px;padding:10px 18px;border-radius:999px}
.card .ft{margin-top:16px;font-size:11px;color:var(--soft)}
@media print{ body{background:#fff} .bar,.hint,.noprint{display:none!important} .card{box-shadow:none;border:1px dashed #ccc;margin:0 auto} }
</style>
</head>
<body>
<div class="bar">
  <div class="f"><label>Nombre del local</label><input id="nom" value="La Taberna"></div>
  <div class="f"><label>Dirección de la carta (URL)</label><input id="url" value="https://www.hosteleroiapos.com"></div>
  <button class="btn" id="gen">Generar QR</button>
  <button class="btn ghost" id="print">🖨️ Imprimir</button>
</div>
<p class="hint">Pon aquí la dirección de tu carta digital (por ejemplo <b>http://IP-del-PC:7875</b> en tu red, o tu dominio). Pulsa Generar, imprime y coloca el cartelito en cada mesa.</p>

<div class="card" id="card">
  <div class="top"></div>
  <img class="mk" alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230F766E'/%3E%3Cstop offset='1' stop-color='%2314B8A6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='16' y='16' width='480' height='480' rx='118' fill='url(%23g)'/%3E%3Crect x='150' y='156' width='48' height='200' rx='16' fill='%23fff'/%3E%3Crect x='314' y='156' width='48' height='200' rx='16' fill='%23fff'/%3E%3Crect x='150' y='232' width='212' height='48' rx='16' fill='%23fff'/%3E%3Ccircle cx='384' cy='150' r='40' fill='%230F172A'/%3E%3Ccircle cx='384' cy='150' r='34' fill='%23F59E0B'/%3E%3C/svg%3E">
  <div class="k" style="margin-top:10px">Carta digital</div>
  <h1 id="cnom">La Taberna</h1>
  <div class="qrbox"><img id="qr" alt="QR de la carta"></div>
  <div class="scan">Escanea y descubre la carta</div>
  <div class="sub">Apunta la cámara del móvil al código</div>
  <div class="res">📅 y reserva tu mesa</div>
  <div class="ft">HOSTELERO · IA POS</div>
</div>

<script>
function gen(){
  var url=document.getElementById('url').value.trim()||'https://www.hosteleroiapos.com';
  var nom=document.getElementById('nom').value.trim()||'Nuestra carta';
  document.getElementById('cnom').textContent=nom;
  document.getElementById('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=432x432&margin=0&color=2b2118&bgcolor=ffffff&data='+encodeURIComponent(url);
}
document.getElementById('gen').addEventListener('click',gen);
document.getElementById('print').addEventListener('click',function(){window.print();});
gen();
</script>
</body>
</html>
