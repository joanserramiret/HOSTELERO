<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOSTELERO · TPV</title>
<script src="brand.js"></script>
<script src="maitre.js" defer></script>
<style>
:root{--bg:#11161f;--bg2:#1b2230;--bg3:#2b3445;--panel:#fff;--panel2:#f6f8fb;--line:#e6eaf0;
--text:#1a2233;--soft:#7c879b;--primary:#4f46e5;--primaryd:#4338ca;--green:#16a34a;--greend:#15803d;
--danger:#e11d48;--amber:#d97706;--radius:16px;--shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);--shadow-lg:0 20px 50px rgba(16,24,40,.18)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;background:var(--panel2);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;transition:transform .08s,background .15s,box-shadow .15s}
button:active{transform:scale(.97)}
input,select{font-family:inherit;font-size:16px;outline:none}
input:focus,select:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.app{display:flex;height:100vh}
.sidebar{width:96px;background:linear-gradient(180deg,#161d2b,#0e131c);color:#cbd5e1;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:5px;flex-shrink:0}
.brand{font-weight:800;font-size:13px;letter-spacing:.5px;color:#fff;text-align:center;line-height:1.1;margin-bottom:12px}
.brand .logo{font-size:25px;display:block;margin-bottom:3px}
.brand small{display:block;font-weight:700;font-size:9px;color:#5b6678;letter-spacing:3px;margin-top:2px}
.nav-item{position:relative;width:80px;padding:12px 4px;border-radius:14px;background:transparent;color:#8b97ad;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:600}
.nav-item .ico{font-size:22px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:var(--primary);color:#fff;box-shadow:0 8px 18px rgba(79,70,229,.45)}
.nav-badge{position:absolute;top:6px;right:14px;min-width:18px;height:18px;border-radius:9px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:18px;text-align:center}
.sidebar .spacer{flex:1}
.caja-pill{font-size:10px;text-align:center;padding:7px 4px;border-radius:10px;width:80px;font-weight:800;letter-spacing:.3px}
.caja-pill.on{background:rgba(22,163,74,.18);color:#4ade80}
.caja-pill.off{background:rgba(225,29,72,.18);color:#fb7185}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:66px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.topbar .ttl{display:flex;flex-direction:column;justify-content:center}
.topbar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.2px}
.topbar .sub{color:var(--soft);font-size:12px;font-weight:600}
.topbar .right{margin-left:auto;display:flex;gap:10px;align-items:center}
.content{flex:1;overflow:auto;padding:20px}
.venta-content{padding:16px}
.btn{padding:11px 17px;border-radius:12px;background:var(--bg3);color:#fff;font-weight:700;font-size:14px}
.btn.primary{background:var(--primary);box-shadow:0 6px 16px rgba(79,70,229,.3)}.btn.primary:hover{background:var(--primaryd)}
.btn.green{background:var(--green);box-shadow:0 6px 16px rgba(22,163,74,.28)}.btn.green:hover{background:var(--greend)}
.btn.danger{background:var(--danger)}
.btn.danger-ghost{background:#fff1f3;color:var(--danger);border:1px solid #fecdd6}
.btn.warn-btn{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.btn.outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
.btn.outline.off{color:var(--soft);border-color:var(--line)}
.btn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line)}.btn.ghost:hover{background:var(--panel2)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn.lg{padding:16px 22px;font-size:16px}
.btn.block{width:100%;margin-top:6px}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:800}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:22px}
.card.warn{padding:14px 16px;margin-bottom:16px;border-left:4px solid var(--amber);background:#fffbeb}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:9px 16px;border-radius:999px;background:var(--panel);border:1px solid var(--line);font-weight:700;color:var(--soft);font-size:14px}
.tab.active{background:var(--bg);color:#fff;border-color:var(--bg)}
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:14px}
.mesa{aspect-ratio:1.12;border-radius:var(--radius);border:2px solid var(--line);background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-weight:800;position:relative;box-shadow:var(--shadow)}
.mesa:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.mesa .nombre{font-size:23px}
.mesa .plazas{font-size:11px;color:var(--soft);font-weight:700}
.mesa .tot{font-size:15px;font-weight:900;color:var(--greend)}
.mesa .cms{font-size:10px;color:var(--soft);font-weight:700}
.mesa.ocupada{border-color:#86efac;background:linear-gradient(180deg,#f0fdf4,#fff)}
.mesa.avisa{border-color:#fbbf24;background:linear-gradient(180deg,#fffbeb,#fff);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.4)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}
.mesa .bell{position:absolute;top:7px;left:9px;font-size:14px}
.mesa .dot{position:absolute;top:9px;right:9px;width:10px;height:10px;border-radius:50%;background:#cbd5e1}
.mesa.ocupada .dot{background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.mesa .time{position:absolute;bottom:7px;font-size:10px;color:var(--soft);font-weight:700}
.venta{display:grid;grid-template-columns:1fr 384px;gap:16px;height:calc(100vh - 98px)}
.carta{display:flex;flex-direction:column;min-height:0}
.cat-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;flex-shrink:0}
.cat-chip{padding:9px 15px;border-radius:999px;color:#fff;font-weight:800;font-size:13px;background:var(--cc);opacity:.5;display:flex;align-items:center;gap:6px}
.cat-chip .ci{font-size:16px}
.cat-chip.active{opacity:1}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(122px,1fr));gap:12px;align-content:start;overflow:auto;padding-right:4px}
.prod{border-radius:14px;border:1px solid var(--line);background:var(--panel);padding:14px 8px 12px;text-align:center;box-shadow:var(--shadow);min-height:118px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.prod:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.prod .pic{font-size:34px;line-height:1;margin-bottom:2px}
.prod .pn{font-weight:700;font-size:13px;line-height:1.15}
.prod .pp{font-weight:900;color:var(--primary);font-size:15px}
.prod .ps{font-size:10px;color:var(--soft);font-weight:600}
.prod.sinstock{opacity:.42}
.ticket{display:flex;flex-direction:column;height:100%;overflow:hidden}
.ticket .thead{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:15px}
.ticket .thead .uds{color:var(--soft);font-size:13px;font-weight:700}
.ticket .lineas{flex:1;overflow:auto;padding:4px 0}
.linea{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--panel2)}
.linea.enviado{background:#fbfdff}
.linea .lic{font-size:20px;width:24px;text-align:center}
.linea .ln{flex:1}.linea .ln b{display:block;font-size:14px}.linea .ln span{font-size:11px;color:var(--soft);font-weight:600}
.kbadge{font-size:12px}
.qtybtn{width:30px;height:30px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);font-size:18px;font-weight:800;color:var(--text);display:flex;align-items:center;justify-content:center}
.qtybtn.coment{font-size:15px}.qtybtn.coment.on{background:#0891b2;border-color:#0891b2}
.linea .qty{width:24px;text-align:center;font-weight:800}
.linea .imp{width:62px;text-align:right;font-weight:800}
.ticket .tfoot{border-top:2px solid var(--line);padding:14px 18px}
.iva-row{font-size:12px;color:var(--soft);display:flex;justify-content:space-between;font-weight:600;margin:10px 0 8px}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.total-row .big{font-size:32px;font-weight:900;letter-spacing:-1px}
.empty{text-align:center;color:var(--soft);padding:46px 16px;font-weight:600;display:flex;flex-direction:column;gap:10px}
.empty .emoji{font-size:42px}
table.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:14px}
.tbl th{color:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:800}
.tbl tr:last-child td{border-bottom:none}.tbl tbody tr:hover{background:var(--panel2)}
.tic{font-size:17px}.note{font-size:11px;color:var(--soft);margin-top:2px}.muted{color:var(--soft)}
.hint{color:var(--soft);font-size:13px;margin-top:16px;line-height:1.5}
.datein{padding:9px 12px;border-radius:10px;border:1px solid var(--line);font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:14px}
.stat{padding:18px}.stat .l{font-size:13px;color:var(--soft);font-weight:700}.stat .v{font-size:26px;font-weight:900;margin-top:5px;letter-spacing:-.5px}
.section-title{font-size:16px;font-weight:800;margin-bottom:14px}.section-title.pad-t{padding:18px 18px 0}
.row-actions{display:flex;gap:8px}
.chart{display:flex;align-items:flex-end;gap:4px;height:140px}
.bar{flex:1;text-align:center}.barfill{background:linear-gradient(180deg,#6366f1,#4f46e5);border-radius:5px;min-height:2px}
.barl{font-size:9px;color:var(--soft);margin-top:3px}
/* KDS */
.kds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.kcard{background:var(--panel);border:1px solid var(--line);border-top:4px solid var(--primary);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.kcard.aviso{border-top-color:var(--amber)}.kcard.urgente{border-top-color:var(--danger)}
.khead{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-size:16px;border-bottom:1px solid var(--line)}
.khead .ktime{font-size:12px;color:var(--soft);font-weight:700}
.kline{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--panel2)}
.kline .kq{font-weight:900;color:var(--primary);min-width:26px}
.kline .kn{flex:1;font-weight:600;font-size:14px}
.kline.listo .kn{color:var(--soft);text-decoration:line-through}
.kfoot{padding:12px 14px}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);border-radius:20px;width:100%;max-width:470px;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .18s ease;max-height:94vh;overflow-y:auto}
.modal.sm{max-width:380px}
@keyframes pop{from{transform:scale(.94);opacity:.6}to{transform:scale(1);opacity:1}}
.modal h2{margin:0;padding:19px 24px;border-bottom:1px solid var(--line);font-size:19px;font-weight:800;position:sticky;top:0;background:#fff}
.modal .mbody{padding:20px 24px}
.modal .foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--soft)}
.field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px}
.inline{display:flex;gap:12px;align-items:flex-end}
.chk{display:flex;gap:8px;align-items:center;font-weight:600;font-size:14px}
.pay-tabs{margin-bottom:14px}
.pay-amount{font-size:34px;font-weight:900;text-align:center;padding:6px;letter-spacing:-1px}
.rapidos{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.keypad button{padding:16px;font-size:20px;font-weight:800;background:var(--panel2);border:1px solid var(--line);border-radius:12px}
.keypad button:hover{background:#eef1f6}
.restante{text-align:center;font-size:15px;margin-bottom:14px;color:var(--soft);font-weight:600}.restante b{color:var(--danger);font-size:20px}
.cubierto{text-align:center;font-size:15px;margin-bottom:14px;color:var(--greend);font-weight:800}
.pagos-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.pago-item{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-weight:600}
.pago-item b{margin-left:auto}
.xpago{background:none;color:var(--soft);font-size:14px;padding:2px 6px}
.cms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cms-btn{padding:18px;font-size:22px;font-weight:800;background:var(--panel2);border:1px solid var(--line);border-radius:14px;color:var(--text)}
.cms-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* Toasts */
#toastRoot{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#0f172a;color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:var(--shadow-lg);animation:tin .25s ease}
.toast.ok{background:#15803d}.toast.out{opacity:0;transform:translateY(8px);transition:.3s}
@keyframes tin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:820px){.venta{grid-template-columns:1fr}.ticket{height:auto;max-height:46vh}}
.mgroup{margin-bottom:18px}
.mgl{font-size:12px;font-weight:800;color:var(--soft);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{padding:10px 14px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--text)}
.opt.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ldet{font-size:11px;color:var(--soft);font-weight:600;margin-top:3px;line-height:1.45}
.kdet{font-size:12px;color:var(--soft);font-weight:600;margin-top:3px;line-height:1.45}
.menuwiz .precio-prev{text-align:center;font-size:22px;font-weight:900;margin:6px 0 14px;color:var(--primary)}
.plano-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border-radius:16px;max-height:calc(100vh - 210px)}
.planofit{transform-origin:top left}
.plano{position:relative;min-height:520px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.plano.editing{background-image:radial-gradient(#dfe5ee 1.3px,transparent 1.3px);background-size:22px 22px;border-style:dashed;border-color:#c7cedb}
.plano .mesa{position:absolute;width:120px;height:106px;aspect-ratio:auto;margin:0;touch-action:none}
.plano .decor{touch-action:none}
.plano .mesa.dragging,.plano .decor.dragging{z-index:50;transform:scale(1.06);box-shadow:0 12px 28px rgba(15,118,110,.45);outline:3px solid #14b8a6}
.plano .mesa.unida::after{content:'🔗';position:absolute;top:2px;left:4px;font-size:13px}
.mesa.editable{cursor:grab;touch-action:none}
.mesa.dragging{cursor:grabbing;z-index:20;box-shadow:var(--shadow-lg);opacity:.93}
.mghint{font-size:10px;color:var(--soft);font-weight:600;text-transform:none;letter-spacing:0}
.mesa .pasebadge{position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:800;color:#fff;padding:2px 9px;border-radius:999px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.mesa.f-barra .nombre{font-size:17px}
.mesa.f-barra .plazas,.mesa.f-barra .pasebadge,.mesa.f-barra .time{display:none}
.plano-tools{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.plano-tools .muted{font-size:12px;color:var(--soft)}
.pasepill{font-size:12px;font-weight:800;padding:6px 12px;border-radius:999px}
.kpase{font-size:11px;font-weight:800;color:#fff;padding:2px 8px;border-radius:999px;margin-left:8px}
.plano{background-image:radial-gradient(#eef1f6 1.2px,transparent 1.2px);background-size:26px 26px}
/* Accesibilidad: familias y productos más grandes (fácil de ver) */
.cat-bar{gap:10px}
.cat-chip{padding:14px 24px;font-size:17px;border-radius:14px}
.cat-chip .ci{font-size:21px}
.prod-grid{grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:14px}
.prod{min-height:132px;padding:16px 10px 14px}
.prod .pic{font-size:42px}
.prod .pn{font-size:15.5px}
.prod .pp{font-size:18px}
.prod .ps{font-size:11px}
.btn123{padding:13px 16px;border-radius:14px;background:#0f172a;color:#fff;font-weight:900;font-size:16px;letter-spacing:1px;flex-shrink:0}
.btn123:hover{background:#1e293b}
.orden-activo{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;padding:11px 16px;border-radius:12px;margin-bottom:12px;font-size:14px;box-shadow:var(--shadow)}
.orden-activo b{font-size:17px;letter-spacing:.5px}
.orden-activo button{margin-left:auto;background:rgba(255,255,255,.22);color:#fff;border-radius:9px;padding:7px 13px;font-weight:800;font-size:13px}
.orden-head{color:#fff;font-weight:800;font-size:11px;letter-spacing:.6px;text-transform:uppercase;padding:6px 14px;margin:6px 0 0;border-radius:6px}
.orden-list{display:flex;flex-direction:column;gap:8px}
.orden-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--panel);font-weight:800;font-size:16px;color:var(--text);text-align:left;width:100%}
.orden-opt.active{background:var(--panel2);box-shadow:inset 0 0 0 2px var(--primary)}
.orden-opt .oc{width:18px;height:18px;border-radius:50%;flex-shrink:0}
.kob{font-size:10px;font-weight:800;color:#fff;padding:1px 8px;border-radius:999px}
.cat-chip{padding:16px 28px!important;font-size:19px!important;border-radius:16px!important;gap:9px!important}
.cat-chip .ci{font-size:24px!important}
.plano{background-image:linear-gradient(rgba(120,90,50,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(120,90,50,.05) 1px,transparent 1px)!important;background-size:32px 32px!important}
.decor{position:absolute;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 4px 12px rgba(0,0,0,.14);color:#fff;font-weight:800;border:1px solid rgba(0,0,0,.06);user-select:none}
.decor .dic{font-size:26px;line-height:1}
.decor .dlab{font-size:11px;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.decor.d-planta{box-shadow:none;color:#2f6b3a;background:transparent!important}
.decor.d-planta .dic{font-size:38px}
.decor.editable{cursor:grab;touch-action:none}
.decor.dragging{cursor:grabbing;z-index:25;opacity:.92}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="logo">🍽️</span>HOSTELERO<small>TPV</small></div>
    <button class="nav-item" data-view="sala"><span class="ico">🍽️</span>Sala</button>
    <button class="nav-item" data-view="cocina"><span class="ico">👨‍🍳</span>Cocina<span class="nav-badge" id="cocinaBadge"></span></button>
    <button class="nav-item" data-view="productos"><span class="ico">📦</span>Carta</button>
    <button class="nav-item" data-view="reservas"><span class="ico">📅</span>Reservas</button>
    <button class="nav-item" data-view="caja"><span class="ico">💶</span>Caja</button>

/* ---------- Helpers puros (testeables) ---------- */
function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }
function eur(n){ try{ return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n||0); }catch(e){ return (n||0).toFixed(2)+' €'; } }
function agotadoProd(p){ try{ return !!(window.HOSTELERO_SYNC && window.HOSTELERO_SYNC.estaAgotado && window.HOSTELERO_SYNC.estaAgotado(p.id)); }catch(e){ return false; } }
function ejecutarAccion(ac){
  if(ac.tipo==='descuento'){ autorizar('descuento',function(){ var t=getTicket(state.ticketActivo); if(!t){toast('Abre un ticket primero');return;} t.descuento={tipo:'pct',valor:ac.param||0}; save(); render(); toast('🏷️ '+(ac.param||0)+'% aplicado'); }); return; }
  if(ac.tipo==='invitacion'){ autorizar('descuento',function(){ var t=getTicket(state.ticketActivo); if(!t){toast('Abre un ticket primero');return;} t.descuento={tipo:'invit'}; save(); render(); toast('🎁 Invitación aplicada'); }); return; }
  if(ac.tipo==='86'){ var on=!agotadoProd({id:ac.param}); if(window.HOSTELERO_SYNC&&window.HOSTELERO_SYNC.setAgotado){ window.HOSTELERO_SYNC.setAgotado(ac.param,on); toast(on?'🚫 Marcado agotado':'✅ Disponible de nuevo'); } return; }
  if(ac.tipo==='tarifa'){ autorizar('descuento',function(){ try{ var S=window.HOSTELERO_SYNC; var m=S.master(); var mm=JSON.parse(JSON.stringify(m)); var nom='',nuevo=false; mm.tarifas=(mm.tarifas||[]).map(function(x){ if(x.id===ac.param){ nuevo=!(x.activa!==false); nom=x.nombre; return Object.assign({},x,{activa:nuevo}); } return x; }); S.guardarMaster(mm); toast('💲 '+esc(nom)+(nuevo?' activada':' desactivada')); }catch(e){} }); return; }
}
function acumularPuntos(t,total){
  if(!t.clienteId)return;
  var ppe=(DB.config&&DB.config.puntosPorEuro)||0; if(!ppe)return;
  var pts=Math.floor(total*ppe); if(pts<=0)return;
  t.puntosGanados=pts;
  try{ var S=window.HOSTELERO_SYNC; if(!S||!S.master)return; var m=S.master(); if(!m||!m.clientes)return;
    var mm=JSON.parse(JSON.stringify(m));
    mm.clientes=mm.clientes.map(function(c){return c.id===t.clienteId?Object.assign({},c,{puntos:(c.puntos||0)+pts}):c;});
    S.guardarMaster(mm);
  }catch(e){}
}
function _tfHorario(t){ if(!t.desde&&!t.hasta)return true; var d=new Date();var hm=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); var de=t.desde||'00:00',ha=t.hasta||'23:59'; return hm>=de&&hm<=ha; }
function tarifaActiva(salaId){ var ts=(DB.tarifas||[]).filter(function(t){return t.activa!==false&&_tfHorario(t);});
  if(salaId){ var s=ts.filter(function(t){return t.salaIds&&t.salaIds.indexOf(salaId)>=0;}); if(s.length)return s[0]; }
  var d=ts.filter(function(t){return t.porDefecto&&(!t.salaIds||!t.salaIds.length);}); if(d.length)return d[0];
  return null;
}
function precioTarifa(p,salaId){ if(p.precio==null)return null; var t=tarifaActiva(salaId); if(!t)return p.precio;
  if(t.precios&&t.precios[p.id]!=null)return t.precios[p.id];
  if(t.pct)return round2(p.precio*(1+t.pct/100));
  return p.precio;
}
function lineaImporte(l){ var base=l.precio*l.cantidad; if(l.descLinea){ if(l.descLinea.tipo==='pct') base-=base*(l.descLinea.valor||0)/100; else if(l.descLinea.tipo==='eur') base-=Math.min(base,l.descLinea.valor||0); } return round2(Math.max(0,base)); }
function totalLineas(lineas){ return round2((lineas||[]).reduce(function(s,l){return s+lineaImporte(l);},0)); }
function desgloseIVA(total, tipo){ tipo = tipo==null?0.10:tipo; var base=round2(total/(1+tipo)); return {base:base, cuota:round2(total-base), tipo:tipo}; }
function cambioEfectivo(total, entregado){ return round2((entregado||0) - total); }
function sumaPagos(pagos){ return round2((pagos||[]).reduce(function(s,p){return s+(p.importe||0);},0)); }
function restantePago(total, pagos){ return round2(total - sumaPagos(pagos)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

/* Unificación: el TPV lee la carta/mesas del MAESTRO del servidor si está disponible */
function aplicarMaster(){
  if(typeof window==='undefined'||!window.HOSTELERO_SYNC)return false;
  var m=window.HOSTELERO_SYNC.master();
  if(!m||!m.productos||!m.productos.length)return false;
  if(m.config){ DB.config=m.config; if(m.config.empresa&&m.config.empresa.nombre) DB.restaurante=m.config.empresa.nombre; }
  DB.promociones=m.promociones||DB.promociones||[];
  DB.clientes=m.clientes||DB.clientes||[];
  DB.comentarios=m.comentarios||DB.comentarios||[];
  DB.tarifas=m.tarifas||DB.tarifas||[];
  DB.accionesRapidas=m.accionesRapidas||DB.accionesRapidas||[];
  DB.datafonos=m.datafonos||DB.datafonos||[];
  DB.cajasEfectivo=m.cajasEfectivo||DB.cajasEfectivo||[];
  DB.categorias=(m.categorias||[]).map(function(c,i){return {id:c.id,nombre:c.nombre,color:c.color||'#64748b',ic:c.ic||'🍽️',orden:(c.orden==null?i+1:c.orden)};});
  DB.productos=(m.productos||[]).map(function(p){
    // arrastra TODOS los campos de la ficha (nombres, 3 precios, flags, disponibilidad…)
    var prod=JSON.parse(JSON.stringify(p));
    prod.ic=p.ic||'🍽️'; prod.activo=p.activo!==false; prod.pasePorDefecto=p.pasePorDefecto||'Primeros';
    // precio: undefined => precio variable (se pregunta) · 0 => gratis · resto => fijo
    prod.precio=(p.precio==null?undefined:p.precio);
    // puente disponibilidad -> stock para el control de existencias del TPV
    if(p.esMenu){ prod.esMenu=true; prod.pasos=p.pasos||[]; prod.controlStock=false; }
    else if(p.limitarDisp && p.disponibilidad!=null){ prod.controlStock=true; prod.stock=p.disponibilidad; }
    else { prod.controlStock=false; prod.stock=(p.stock==null?100:p.stock); }
    return prod;
  });
  if(m.mesas&&m.mesas.length){
    var prev={};(DB.mesas||[]).forEach(function(x){prev[x.id]=x;});
    DB.salas=(m.salas||[]).map(function(s,i){return {id:s.id,nombre:s.nombre,orden:i+1,bg:s.bg};});
    DB.mesas=m.mesas.map(function(mm,i){var pv=prev[mm.id]||{};return {id:mm.id,salaId:mm.salaId,nombre:mm.nombre,plazas:mm.plazas||4,forma:mm.forma||'cuadrada',estado:pv.estado||'libre',ticketId:pv.ticketId||null,x:(mm.x!=null?mm.x:(pv.x==null?((i%4)*156+24):pv.x)),y:(mm.y!=null?mm.y:(pv.y==null?(Math.floor(i/4)*140+24):pv.y))};});
    DB.decor=(m.decor||[]).slice();
  }
  save();return true;
}

function descuentoImporte(t){ if(!t||!t.descuento)return 0; var b=totalLineas(t.lineas); if(t.descuento.tipo==='invit')return b; if(t.descuento.tipo==='pct')return round2(b*(t.descuento.valor||0)/100); if(t.descuento.tipo==='eur')return round2(Math.min(b,t.descuento.valor||0)); return 0; }

function _enHorario(p){ if(p.tipo!=='horario')return true; var now=new Date(); var hm=now.getHours()*60+now.getMinutes(); function tm(x){var a=(x||'0:0').split(':');return (+a[0])*60+(+a[1]||0);} if(p.desde&&p.hasta){ if(!(hm>=tm(p.desde)&&hm<=tm(p.hasta)))return false; } if(p.dias&&p.dias.length){ if(p.dias.indexOf(now.getDay())<0)return false; } return true; }
function _matchP(p,l){ var pr=getProducto(l.productoId); if(p.productoId)return l.productoId===p.productoId; if(p.categoriaId)return pr&&pr.categoriaId===p.categoriaId; return true; }
function promocionesTicket(t){ var det=[],total=0; if(!t||!t.lineas)return {total:0,detalle:det};
  promosActivas().forEach(function(p){
    if(p.tipo==='horario'){ if(!_enHorario(p))return; var sub=0; t.lineas.forEach(function(l){ if(_matchP(p,l)) sub+=l.precio*l.cantidad; }); var imp=round2(sub*(p.pct||0)/100); if(imp>0){det.push({nombre:p.nombre,importe:imp});total+=imp;} }
    else if(p.tipo==='nxm'){ t.lineas.forEach(function(l){ if(_matchP(p,l)){ var n=p.n||2,m=p.m||1; var gratis=Math.floor(l.cantidad/n)*(n-m); var imp=round2(gratis*l.precio); if(imp>0){det.push({nombre:p.nombre,importe:imp});total+=imp;} } }); }
    else if(p.tipo==='pack'){ var ids=p.productos||[]; if(!ids.length)return; var cnt={}; t.lineas.forEach(function(l){ cnt[l.productoId]=(cnt[l.productoId]||0)+l.cantidad; }); var packs=Math.min.apply(null,ids.map(function(id){return Math.floor(cnt[id]||0);})); if(packs>0){ var sn=0; ids.forEach(function(id){ var pr=getProducto(id); if(pr)sn+=pr.precio; }); var imp=round2(packs*(sn-(p.precio||0))); if(imp>0){det.push({nombre:p.nombre,importe:imp});total+=imp;} } }
  });
  return {total:round2(total),detalle:det};

function pesoPrompt(p){ // devuelve {peso, importe} o null si cancela. precio = €/kg

  if(precioKg===null)return null;
  return {peso:kg, importe:round2(precioKg*kg)};

function addProducto(ticketId,p,cant){

/* ---------- Cobro: pago mixto / dividir / propina ---------- */
function finalizarTicket(ticketId, opts){
  opts=opts||{}; var pagos=opts.pagos||[]; var propina=opts.propina||0;
  var t=getTicket(ticketId); if(!t||t.estado!=='abierto')return false;
  var total=totalNeto(t);
  if(restantePago(total,pagos)>0.001) return false; // aún no cubierto
  t.lineas.forEach(function(l){ var p=getProducto(l.productoId); if(p&&p.controlStock) p.stock=round2(p.stock-l.cantidad); });
  var efe=round2(pagos.filter(function(p){return p.metodo==='efectivo';}).reduce(function(s,p){return s+p.importe;},0));
  var tar=round2(pagos.filter(function(p){return p.metodo==='tarjeta';}).reduce(function(s,p){return s+p.importe;},0));
  var otros=round2(sumaPagos(pagos)-efe-tar);
  // el cambio (exceso de efectivo) no cuenta como ingreso
  var exceso=round2(sumaPagos(pagos)-total);
  var efeNeto=round2(Math.max(0, efe-exceso));
  t.estado='cobrado'; t.closedAt=Date.now(); t.pagos=pagos; t.propina=round2(propina);
  t.metodoPago = pagos.length>1 ? 'mixto' : (pagos[0]?pagos[0].metodo:'efectivo');
  t.cobradoEfectivo=efeNeto; t.cobradoTarjeta=tar; t.cobradoOtros=otros;
  if(t.mesaId){ var m=getMesa(t.mesaId); if(m){m.estado='libre';m.ticketId=null;} }
  acumularPuntos(t,total);
  if(efe>0 && cajaEfectivoIntegrada()) enviarEfectivo(total, efe);
  save(); return true;
}

function rangoPeriodo(p){ var ini=new Date(); ini.setHours(0,0,0,0);

  if(p==='todo'){ return {ini:0,fin:Date.now()}; }
  return {ini:ini.getTime(),fin:Date.now()}; }

  var efe=del.reduce(function(a,t){return a+(t.cobradoEfectivo||0);},0), tar=del.reduce(function(a,t){return a+(t.cobradoTarjeta||0);},0), otr=del.reduce(function(a,t){return a+(t.cobradoOtros||0);},0), prop=del.reduce(function(a,t){return a+(t.propina||0);},0);
  var rank={}; del.forEach(function(t){t.lineas.forEach(function(l){ var k=l.productoId||l.nombre; var x=rank[k]||{nombre:l.nombre,ic:l.ic,uds:0,imp:0}; x.uds+=l.cantidad; x.imp+=l.precio*l.cantidad; rank[k]=x; });});
  var top=Object.keys(rank).map(function(k){return rank[k];}).sort(function(a,b){return b.imp-a.imp;}).slice(0,12);
  var cat={}; del.forEach(function(t){t.lineas.forEach(function(l){ var pr=getProducto(l.productoId); var cn=pr?((DB.categorias.filter(function(c){return c.id===pr.categoriaId;})[0]||{}).nombre||'Otros'):'Otros'; cat[cn]=(cat[cn]||0)+l.precio*l.cantidad; });});

  var hora=new Array(24).fill(0); del.forEach(function(t){ hora[new Date(t.closedAt).getHours()]+=totalNeto(t); });
  var maxH=Math.max.apply(null,[1].concat(hora));
  var bars=hora.map(function(v,h){return '<div class="bar"><div class="barfill" title="'+eur(v)+'" style="height:'+(v/maxH*110)+'px"></div><div class="barl">'+h+'</div></div>';}).join('');

    case 'delmesa': { var rdel=deleteMesa(el.dataset.id); if(rdel==='ocupada'){ alert('No se puede eliminar una mesa ocupada.'); } else { pushPlanoMaster(); closeModal(); render(); } break; }
    case 'separarmesa': { var ms=getMesa(el.dataset.id); if(ms){ ms.grupo=undefined; save(); pushPlanoMaster(); } closeModal(); render(); break; }
    case 'pasenext': setPase(state.ticketActivo,1); render(); break;
    case 'paseprev': setPase(state.ticketActivo,-1); render(); break;
    case 'mesa': { if(state.editPlano)break; var m=getMesa(id); var t=abrirTicketMesa(m); state.ticketActivo=t.id; state.catSel=null; state.ordenActivo=null; render(); if(!t.comensales) modalComensales(); break; }
    case 'barra': { var t2=nuevoTicketBarra(); state.ticketActivo=t2.id; state.catSel=null; state.ordenActivo=null; render(); break; }
    case 'volver': state.ticketActivo=null; render(); break;
    case 'comensales': modalComensales(); break;
    case 'setcms': { document.getElementById('cms_n').value=el.dataset.n; document.querySelectorAll('.cms-btn').forEach(function(b){b.classList.toggle('active',b.dataset.n===el.dataset.n);}); break; }
    case 'savecms': { var v=parseInt(document.getElementById('cms_n').value)||null; setComensales(state.ticketActivo,v); closeModal(); render(); break; }
    case 'cat': state.catSel=id; render(); break;
    case 'descuento': autorizar('descuento',modalDescuento); break;
    case 'cliente': modalCliente(); break;
    case 'setcliente': { var tc=getTicket(state.ticketActivo); if(tc){ tc.clienteId=el.dataset.id||null; save(); } closeModal(); render(); break; }
    case 'setdesc': { var td=getTicket(state.ticketActivo); var tp=el.dataset.t;
      if(tp==='quitar'){ td.descuento=null; }
      else if(tp==='invit'){ td.descuento={tipo:'invit'}; }
      else { var pct=parseFloat((document.getElementById('ds_pct')||{}).value)||0; var eu=parseFloat((document.getElementById('ds_eur')||{}).value)||0; if(pct>0)td.descuento={tipo:'pct',valor:pct}; else if(eu>0)td.descuento={tipo:'eur',valor:eu}; else td.descuento=null; }
      save(); closeModal(); render(); break; }
    case 'infper': state.infPeriodo=el.dataset.p; render(); break;
    case 'imprimirinforme': imprimirInforme(); break;
    case 'orden123': modal123(); break;
    case 'setorden': state.ordenActivo=el.dataset.o; closeModal(); render(); break;
    case 'ordendef': state.ordenActivo=null; closeModal(); render(); break;
    case 'add': { var p=getProducto(id); if((p.controlStock&&p.stock<=0)||agotadoProd(p)){ toast('🚫 '+(p.nombreBoton||p.nombre)+' no disponible'); break; } if(p.esMenu){openMenu(p);} else if(p.mods&&p.mods.length){openConfig(p);} else {addProducto(state.ticketActivo,p);render();} break; }
    case 'disponibilidad': modalDisponibilidad(); break;
    case 'accrap': { var ac=(DB.accionesRapidas||[]).filter(function(x){return x.id===id;})[0]; if(ac) ejecutarAccion(ac); break; }
    case 'togdisp': { var pid=el.dataset.id; window.HOSTELERO_SYNC.setAgotado(pid, !agotadoProd({id:pid})); setTimeout(function(){ if(document.getElementById('dispPanel'))modalDisponibilidad(); },150); break; }
    case 'cfgsel': { var cg=+el.dataset.g, co=+el.dataset.o; var grp=getProducto(state.cfg.pid).mods[cg]; if(grp.tipo==='check'){ var arr=state.cfg.sel[cg]; var ix=arr.indexOf(co); if(ix>=0)arr.splice(ix,1); else arr.push(co); } else { state.cfg.sel[cg]=co; } modalConfig(); break; }
    case 'addcfg': confirmConfig(); break;
    case 'menusel': state.menu.sel[+el.dataset.g]=+el.dataset.o; modalMenu(); break;
    case 'addmenu': confirmMenu(); break;
    case 'mas': cambiarCantidad(state.ticketActivo,+el.dataset.idx,1); render(); break;
    case 'menos': cambiarCantidad(state.ticketActivo,+el.dataset.idx,-1); render(); break;
    case 'linea': modalLinea(+el.dataset.idx); break;
    case 'lin_cant': { var t=getTicket(state.ticketActivo),l=t&&t.lineas[state.linIdx]; if(l){ var c=parseInt((document.getElementById('lin_c')||{}).value,10); if(c>0){ l.cantidad=c; save(); } else if(c===0){ if(confirm('¿Quitar esta línea?')){ t.lineas.splice(state.linIdx,1); save(); closeModal(); render(); } break; } } modalLinea(state.linIdx); break; }
    case 'lin_precio': autorizar('descuento',function(){ var t=getTicket(state.ticketActivo),l=t&&t.lineas[state.linIdx]; if(l){ var x=prompt('Nuevo precio unitario de '+l.nombre+' (€):',l.precio); if(x!==null){ var n=parseFloat(String(x).replace(',','.')); if(!isNaN(n))l.precio=round2(n); save(); } } modalLinea(state.linIdx); }); break;
    case 'lin_desc': { var t=getTicket(state.ticketActivo),l=t&&t.lineas[state.linIdx]; if(l){ var tp=el.dataset.t; if(tp==='quitar'){ l.descLinea=null; } else { var pc=parseFloat((document.getElementById('lin_pct')||{}).value)||0; var eu=parseFloat((document.getElementById('lin_eur')||{}).value)||0; if(pc>0)l.descLinea={tipo:'pct',valor:pc}; else if(eu>0)l.descLinea={tipo:'eur',valor:eu}; else l.descLinea=null; } save(); } modalLinea(state.linIdx); break; }
    case 'lin_com': { var t=getTicket(state.ticketActivo),l=t&&t.lineas[state.linIdx]; if(l){ var cur=document.getElementById('lin_txt'); var add=el.dataset.txt||''; if(cur){ cur.value=(cur.value?cur.value+', ':'')+add; } } break; }
    case 'lin_comsave': { var t=getTicket(state.ticketActivo),l=t&&t.lineas[state.linIdx]; if(l){ var cur=document.getElementById('lin_txt'); l.comentario=(cur&&cur.value.trim())||''; if(!l.comentario)delete l.comentario; save(); } closeModal(); render(); break; }
    case 'enviarCocina': { var n=enviarCocina(state.ticketActivo); if(n>0) toast('👨‍🍳 '+n+' plato(s) enviados a cocina'); render(); break; }
    case 'anular': autorizar('anular',function(){ if(confirm('¿Anular este ticket?')){ anularTicket(state.ticketActivo); state.ticketActivo=null; render(); } }); break;
    case 'cobrar': state.cobro={pagos:[],ent:'',metodo:'efectivo',propina:''}; modalCobro(); break;
    case 'metodo': state.cobro.metodo=el.dataset.m; modalCobro(); break;
    case 'rapido': state.cobro.ent=el.dataset.v; modalCobro(); break;
    case 'kp': { var k=el.dataset.k, co=state.cobro; if(k==='C')co.ent=''; else if(k==='⌫')co.ent=co.ent.slice(0,-1); else co.ent=(co.ent+k).replace(/^0+(\d)/,'$1'); modalCobro(); break; }
    case 'enviardf': enviarDatafono(parseFloat(el.dataset.imp)||0); break;
    case 'addpago': { var co2=state.cobro; var total=totalLineas(getTicket(state.ticketActivo).lineas); var rest=restantePago(total,co2.pagos);
      var imp=parseFloat(co2.ent||'0')||0; if(imp<=0) imp=rest; if(imp<=0){ break; }
      co2.pagos.push({metodo:co2.metodo,importe:round2(imp)}); co2.ent=''; modalCobro(); break; }
    case 'delpago': { state.cobro.pagos.splice(+el.dataset.i,1); modalCobro(); break; }
    case 'finalizar': { var co3=state.cobro; var pr=parseFloat((document.getElementById('propina')||{}).value)||0;
      var _tid=state.ticketActivo; var ok=finalizarTicket(_tid,{pagos:co3.pagos,propina:pr});
      if(ok){ var _tk=getTicket(_tid); closeModal(); state.ticketActivo=null; toast('✅ Ticket cobrado'+(pr>0?' · propina '+eur(pr):''),'ok'); try{ if(_tk&&_tk.clienteId) imprimirFactura(_tk); else imprimirTicketCobro(_tk); }catch(e){} render(); } break; }
    case 'kprep': setEstadoLinea(el.dataset.tid,el.dataset.kid,'preparando'); render(); break;
    case 'klisto': { setEstadoLinea(el.dataset.tid,el.dataset.kid,'listo'); var tt=getTicket(el.dataset.tid); if(tt&&ticketTodoListo(tt)) toast('🔔 '+(tt.mesaNombre||('#'+tt.numero))+': comanda lista'); render(); break; }
    case 'avisar': { avisarCamarero(el.dataset.tid); var t4=getTicket(el.dataset.tid); toast('🔔 Aviso enviado: '+(t4.mesaNombre||('#'+t4.numero))+' lista para recoger','ok'); render(); break; }
    case 'recoger': recogerComanda(el.dataset.tid); render(); break;
    case 'refrescar': render(); break;
    case 'pakey': { var pk2=el.dataset.k, pa=state.pinAuth; if(!pa)break; if(pk2==='C')pa.ent=''; else if(pk2==='⌫')pa.ent=pa.ent.slice(0,-1); else if(pa.ent.length<4)pa.ent+=pk2; if(pa.ent.length===4) verificarPin(); else modalPinAuth(); break; }
    case 'nuevop': modalProducto(null); break;
    case 'editp': modalProducto(getProducto(id)); break;
    case 'savep': saveProducto(id); break;
    case 'delp': if(confirm('¿Eliminar producto?')){ DB.productos=DB.productos.filter(function(x){return x.id!==id;}); save(); closeModal(); render(); } break;
    case 'reset': if(confirm('¿Restaurar el restaurante demo? Se perderán los cambios.')){ resetDemo(); state.ticketActivo=null; render(); } break;
    case 'abrirCaja': abrirCaja(parseFloat(document.getElementById('saldoIni').value)||0); render(); break;

    case 'nuevaR': modalReserva(); break;
    case 'saveR': saveReserva(el.dataset.fecha); break;
    case 'sentar': cambiarEstadoReserva(id,'sentada'); render(); break;
    case 'cancelarR': cambiarEstadoReserva(id,'cancelada'); render(); break;
  }
}
function saveProducto(id){
  var n=document.getElementById('mp_n').value.trim(); if(!n){alert('Pon el nombre');return;}
  var data={id:id||uid(),nombre:n,ic:document.getElementById('mp_ic').value||'🍽️',categoriaId:document.getElementById('mp_c').value,
    precio:parseFloat(document.getElementById('mp_p').value)||0,stock:parseFloat(document.getElementById('mp_s').value)||0,
    controlStock:document.getElementById('mp_cs').checked,activo:document.getElementById('mp_a').checked,pasePorDefecto:(document.getElementById('mp_pase')?document.getElementById('mp_pase').value:'Primeros')};
  if(id){ DB.productos=DB.productos.map(function(p){return p.id===id?data:p;}); } else { DB.productos.push(data); }

}

/* ----- Plano de sala: arrastrar mesas (mouse + táctil) ----- */
var drag=null,_suppressClick=false,planoScale=1;
function fitPlano(){
  var wrap=document.querySelector('.plano-wrap'), fit=document.querySelector('.planofit'), pl=fit&&fit.querySelector('.plano');
  if(!wrap||!fit||!pl){ planoScale=1; return; }
  var cw=pl.offsetWidth||1, ch=pl.offsetHeight||1;
  var s=Math.min(1,(wrap.clientWidth-2)/cw);
  planoScale=s;
  fit.style.transform='scale('+s+')';
  fit.style.width=(cw*s)+'px'; fit.style.height=(ch*s)+'px';
}
function onPointerDown(e){
  if(state.view!=='sala')return;
  var el=e.target.closest('.mesa[data-id], .decor[data-decor]'); if(!el)return;
  var plano=document.querySelector('.plano'); if(!plano)return;
  var pr=plano.getBoundingClientRect(), mr=el.getBoundingClientRect();
  var kind=(el.dataset.decor?'decor':'mesa');
  if(!state.editPlano && kind==='decor')return; // en modo normal solo se mueven mesas
  drag={kind:kind,id:(el.dataset.decor||el.dataset.id),el:el,dx:(e.clientX-mr.left)/planoScale,dy:(e.clientY-mr.top)/planoScale,pr:pr,x0:e.clientX,y0:e.clientY,moved:false,armed:false,timer:null};
  if(state.editPlano){ drag.armed=true; el.classList.add('dragging'); e.preventDefault(); }
  else { drag.timer=setTimeout(function(){ if(drag&&!drag.moved){ drag.armed=true; drag.el.classList.add('dragging'); } }, 380); }
}
function onPointerMove(e){ if(!drag)return;
  if(!drag.moved && (Math.abs(e.clientX-drag.x0)>6||Math.abs(e.clientY-drag.y0)>6)){
    drag.moved=true;
    if(!drag.armed){ if(drag.timer){clearTimeout(drag.timer);drag.timer=null;} drag=null; return; } // movimiento sin pulsación larga: dejar scroll normal
  }
  if(!drag.armed)return;
  e.preventDefault();
  var x=Math.max(0,(e.clientX-drag.pr.left)/planoScale-drag.dx), y=Math.max(0,(e.clientY-drag.pr.top)/planoScale-drag.dy);
  drag.el.style.left=Math.round(x)+'px'; drag.el.style.top=Math.round(y)+'px'; }
function onPointerUp(){ if(!drag)return;
  var d=drag; drag=null; if(d.timer)clearTimeout(d.timer);
  if(d.el)d.el.classList.remove('dragging');
  if(!d.armed)return; // fue un toque normal: que el click abra la mesa
  _suppressClick=true;
  if(!d.moved){ if(state.editPlano){ if(d.kind==='decor') modalDecorEditor(d.id); else modalMesaEditor(d.id); } return; }
  var x=parseInt(d.el.style.left)||0, y=parseInt(d.el.style.top)||0;
  if(d.kind==='decor'){ updateDecor(d.id,{x:x,y:y}); pushPlanoMaster(); return; }
  var m=getMesa(d.id); if(!m)return; m.x=x; m.y=y; save();
  // ¿soltada encima de otra mesa? -> unir
  var fd=formaDims(m.forma), cx=x+fd.w/2, cy=y+fd.h/2;
  var tgt=(DB.mesas||[]).filter(function(o){ if(o.id===m.id||o.salaId!==m.salaId)return false; var of=formaDims(o.forma); return cx>=o.x && cx<=o.x+of.w && cy>=o.y && cy<=o.y+of.h; })[0];
  if(tgt){
    var raiz=mesaRaiz(tgt);
    if(raiz.id!==m.id && m.grupo!==raiz.id){
      if(confirm('¿Unir '+m.nombre+' con '+raiz.nombre+'? Trabajarán como una sola mesa (misma cuenta).')){
        m.grupo=raiz.id; var rf=formaDims(raiz.forma); m.x=raiz.x+rf.w-22; m.y=raiz.y+16; save();
      }
    }
  }
  pushPlanoMaster(); }

/* ----- Autorización por PIN (permisos de acción) ----- */
function autorizar(accion, cb){
  var A=(typeof window!=='undefined')&&window.HOSTELERO_AUTH;
  if(!A){ cb(); return; }
  if(state.operador && A.permiso(state.operador.rol, accion)){ cb(); return; }
  state.pinAuth={accion:accion, cb:cb, ent:''}; modalPinAuth();
}
function modalPinAuth(){
  var p=state.pinAuth; if(!p)return; var dots=''; for(var i=0;i<4;i++)dots+='<span class="dot'+(i<p.ent.length?' on':'')+'" style="display:inline-block;width:15px;height:15px;border-radius:50%;border:2px solid var(--line);'+(i<p.ent.length?'background:var(--primary);border-color:var(--primary)':'')+'"></span>';
  var keys=['1','2','3','4','5','6','7','8','9','C','0','⌫'];
  var kp=keys.map(function(k){return '<button data-act="pakey" data-k="'+k+'">'+k+'</button>';}).join('');
  openModal('<div class="modal sm" data-stop><h2>🔐 Autorización requerida</h2><div class="mbody" style="text-align:center"><p class="muted" style="margin:0 0 6px">Introduce el PIN de un usuario con permiso.</p><div style="display:flex;gap:12px;justify-content:center;margin:12px 0">'+dots+'</div><div class="keypad">'+kp+'</div></div><div class="foot"><button class="btn ghost" data-act="closeModal">Cancelar</button></div></div>');
}
function verificarPin(){
  var p=state.pinAuth; if(!p)return;
  var A=(typeof window!=='undefined')&&window.HOSTELERO_AUTH;
  var u=A?A.usuarios().filter(function(x){return String(x.pin)===String(p.ent);})[0]:null;
  if(u && A.permiso(u.rol,p.accion)){ state.operador=u; closeModal(); var cb=p.cb; state.pinAuth=null; cb(); }
  else { p.ent=''; toast('PIN incorrecto o sin permiso'); modalPinAuth(); }
}

  var bruto=totalLineas(t.lineas), desc=round2(descuentoImporte(t)+clienteDescuento(t)+promocionesTicket(t).total), total=round2(bruto-desc), iva=desgloseIVAmulti(t.lineas);

    +'<h2>FACTURA Nº '+t.numeroFactura+'</h2>'
    +'<div class="box"><b>'+esc(emp.nombre||'HOSTELERO')+'</b><br>'+esc(emp.direccion||'')+'<br>CIF: '+esc(emp.cif||'')+(emp.telefono?(' · Tel: '+esc(emp.telefono)):'')+'</div>'
    +'<div class="box"><b>Cliente:</b> '+esc(cli.nombre||'')+'<br>'+esc(cli.direccion||'')+'<br>CIF/NIF: '+esc(cli.cif||'')+'</div>'
    +'<div>Fecha: '+new Date(t.closedAt||Date.now()).toLocaleString('es-ES')+'</div>'
    +'<table><thead><tr><th>Ud</th><th>Concepto</th><th class="r">Importe</th></tr></thead><tbody>'+rows+'</tbody></table>'
    +'<table style="margin-top:8px">'+(desc>0?'<tr><td>Subtotal</td><td class="r">'+eur(bruto)+'</td></tr><tr><td>Descuentos</td><td class="r">-'+eur(desc)+'</td></tr>':'')
    +iva.map(function(d){return '<tr><td>Base '+d.tipo+'%</td><td class="r">'+eur(d.base)+'</td></tr><tr><td>IVA '+d.tipo+'%</td><td class="r">'+eur(d.cuota)+'</td></tr>';}).join('')+reRows
    +'<tr><td><b>TOTAL</b></td><td class="r"><b>'+eur(total)+'</b></td></tr></table>'+(reg?('<div class="box" style="font-size:10px;word-break:break-all"><b>'+(reg.sistema==='verifactu'?'VERI*FACTU':'TicketBAI')+'</b> · '+esc(reg.id)+'<br>'+esc(reg.url)+'</div>'):'')
    +'</body></html>';
  imprimirHTML(html);
}

/* ----- TicketBAI / Verifactu: huella encadenada (SHA-256) ----- */
function sha256(ascii){
  function rr(v,a){ return (v>>>a)|(v<<(32-a)); }
  var mp=Math.pow, mw=mp(2,32), result='';
  var words=[], abl=ascii.length*8;
  var hash=sha256.h=sha256.h||[], k=sha256.k=sha256.k||[], pc=k.length, ic={};
  for(var cand=2;pc<64;cand++){ if(!ic[cand]){ for(var i=0;i<313;i+=cand){ ic[i]=cand; } hash[pc]=(mp(cand,.5)*mw)|0; k[pc++]=(mp(cand,1/3)*mw)|0; } }
  ascii+='\x80'; while(ascii.length%64-56) ascii+='\x00';
  for(i=0;i<ascii.length;i++){ var j=ascii.charCodeAt(i); if(j>>8) return; words[i>>2]|=j<<((3-i)%4)*8; }
  words[words.length]=((abl/mw)|0); words[words.length]=(abl);
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16), oh=hash; hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2], a=hash[0], e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]+(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash); hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++){ hash[i]=(hash[i]+oh[i])|0; }
  }
  for(i=0;i<8;i++){ for(j=3;j+1;j--){ var b=(hash[i]>>(j*8))&255; result+=((b<16)?0:'')+b.toString(16); } }
  return result;
}
function _p2f(n){ return n<10?'0'+n:''+n; }
function registroFiscal(t){
  var cfg=(DB.config&&DB.config.facturacion)||{}; if(!cfg.sistema||cfg.sistema==='ninguno')return null;
  if(t.regFiscal)return t.regFiscal;
  var emp=(DB.config&&DB.config.empresa)||{}; var cif=(emp.cif||'').replace(/[^A-Za-z0-9]/g,'');
  DB.numFiscal=(DB.numFiscal||0)+1;
  var serie=cfg.serie||'A', numero=DB.numFiscal, total=totalNeto(t), fecha=new Date(t.closedAt||Date.now());
  var prev=DB.regFiscalUltimo||'';
  var canonical=[cif,serie,numero,fecha.toISOString(),total.toFixed(2),prev].join('|');
  var huella=(sha256(canonical)||'').toUpperCase();
  var id='TBAI-'+cif+'-'+_p2f(fecha.getDate())+_p2f(fecha.getMonth()+1)+String(fecha.getFullYear()).slice(2)+'-'+serie+numero+'-'+huella.slice(0,13);
  var base=cfg.sistema==='verifactu'?'https://www2.agenciatributaria.gob.es/wlpl/TIKE-CONT/ValidarQR':'https://tbai.egoitza.gipuzkoa.eus/qr/';
  var url=base+'?nif='+encodeURIComponent(emp.cif||'')+'&serie='+encodeURIComponent(serie)+'&num='+numero+'&fecha='+fecha.toLocaleDateString('es-ES')+'&importe='+total.toFixed(2);
  var reg={sistema:cfg.sistema,serie:serie,numero:numero,fecha:fecha.getTime(),nif:emp.cif||'',importe:total,huellaAnterior:prev,huella:huella,id:id,url:url};
  t.regFiscal=reg; DB.regFiscalUltimo=huella; if(!DB.regFiscal)DB.regFiscal=[]; DB.regFiscal.push(reg); save();
  return reg;
}
