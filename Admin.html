<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOSTELERO · Administración</title>
<script src="brand.js"></script>
<script src="maitre.js" defer></script>
<style>
:root{--bg:#f4f6fb;--panel:#fff;--panel2:#f6f8fb;--line:#e6eaf0;--text:#1a2233;--soft:#7c879b;
--primary:#4f46e5;--primaryd:#4338ca;--green:#16a34a;--red:#e11d48;--amber:#d97706;
--radius:14px;--shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06)}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;transition:.12s;touch-action:manipulation;-webkit-user-select:none;user-select:none}
input,select{font-family:inherit;font-size:15px;outline:none}
input:focus,select:focus{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.app{display:flex;height:100vh}
.side{width:230px;background:#11161f;color:#cbd5e1;flex-shrink:0;display:flex;flex-direction:column;padding:18px 14px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a3650 transparent}
.side::-webkit-scrollbar{width:7px}
.side::-webkit-scrollbar-thumb{background:#2a3650;border-radius:4px}
.side .nav{flex:0 0 auto}
.brand{font-weight:800;font-size:16px;color:#fff;margin:4px 8px 22px;letter-spacing:.5px}
.brand small{display:block;font-size:10px;color:#5b6678;letter-spacing:2px;font-weight:700}
.nav{display:flex;flex-direction:column;gap:4px}
.nav button{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:11px;background:transparent;color:#9aa6bd;font-weight:700;font-size:15px;text-align:left}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--primary);color:#fff}
.side .sp{flex:1}
.side .me{font-size:12px;color:#7c879b;padding:10px 14px}
.side .out{background:#1c2536;color:#cbd5e1;border-radius:10px;padding:10px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{height:62px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.top h1{font-size:20px;margin:0;font-weight:800}
.top .modo{margin-left:auto;font-size:12px;font-weight:700;color:var(--soft)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.content{flex:1;overflow:auto;padding:22px}
.btn{padding:10px 16px;border-radius:10px;background:var(--primary);color:#fff;font-weight:700;font-size:14px}
.btn:hover{background:var(--primaryd)}
.btn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line)}
.btn.red{background:var(--red)}
.btn.sm{padding:7px 12px;font-size:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.bar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.bar h2{font-size:18px;margin:0;font-weight:800}
.bar .r{margin-left:auto;display:flex;gap:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:14px}
th{color:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:800}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--panel2)}
.badge{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:800}
.tic{font-size:18px}
.catgrp{font-weight:800;font-size:13px;color:#fff;padding:7px 14px;border-radius:8px;margin:18px 0 8px}
.avatar{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.mesas-prev{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.mp{padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);font-weight:700;font-size:13px}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--panel);border-radius:18px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:94vh;overflow-y:auto}
.modal h3{margin:0;padding:18px 22px;border-bottom:1px solid var(--line);font-size:18px}
.mb{padding:20px 22px}
.foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;color:var(--soft);margin-bottom:6px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px}
.row{display:flex;gap:12px}.row .field{flex:1}
.chk{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
/* login */
.login{height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lc{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:30px;max-width:380px;width:100%;box-shadow:var(--shadow)}
.lc h2{margin:0 0 4px;font-size:22px}.lc p{color:var(--soft);font-size:13px;margin:0 0 20px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:#0f172a;color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;box-shadow:var(--shadow)}
.toast.ok{background:var(--green)}
.bchk{width:18px;height:18px;cursor:pointer;vertical-align:middle}
.content th{cursor:pointer;user-select:none;-webkit-user-select:none}
.content th[data-dir=asc]::after{content:' ▲';color:var(--primary);font-size:10px}
.content th[data-dir=desc]::after{content:' ▼';color:var(--primary);font-size:10px}
#bulkbar{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:75;background:#0f172a;color:#fff;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.35);display:none;align-items:center;gap:8px;padding:10px 12px;flex-wrap:wrap;max-width:calc(100vw - 24px)}
#bulkbar.on{display:flex}
#bulkbar .cnt{font-weight:800;font-size:13px;padding:0 6px;white-space:nowrap}
#bulkbar button{padding:9px 12px;border-radius:10px;font-weight:700;font-size:13px;background:#1e293b;color:#fff;border:1px solid #334155;white-space:nowrap}
#bulkbar button.red{background:var(--red);border-color:var(--red)}
#bulkbar button.x{background:transparent;border:none;color:#94a3b8;padding:6px 10px}
/* ---- Responsive (móvil / tablet) ---- */
@media (max-width:860px){
  html,body{height:auto}
  .app{flex-direction:column;height:auto;min-height:100vh}
  .side{width:100%;flex-direction:row;align-items:center;gap:8px;padding:7px 9px;position:sticky;top:0;z-index:30}
  .side .brand,.side .sp,.side .me{display:none}
  .nav{flex-direction:row;flex:1;overflow-x:auto;gap:6px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav button{flex:0 0 auto;padding:9px 13px;font-size:13px;white-space:nowrap}
  .side .out{flex:0 0 auto;padding:9px 12px;font-size:13px;white-space:nowrap}
  .main{overflow:visible}
  .top{height:auto;min-height:52px;padding:10px 14px;flex-wrap:wrap}
  .top h1{font-size:17px}
  .top .modo{font-size:11px}
  .content{padding:12px;overflow:visible}
  .bar{flex-wrap:wrap;margin-bottom:12px}
  .bar h2{font-size:16px}
  .bar .r{margin-left:0;width:100%;flex-wrap:wrap}
  .bar .r .btn{flex:1 1 auto;text-align:center}
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:540px}
  th,td{padding:9px 10px;font-size:13px}
  .row{flex-direction:column;gap:0}
  input,select,.field input,.field select{font-size:16px}
  .overlay{padding:0;align-items:flex-end}
  .modal{max-width:none;max-height:94vh;border-radius:18px 18px 0 0}
  .mb{padding:16px}
  .foot{flex-wrap:wrap;padding:14px 16px}
  .foot .btn{flex:1 1 auto;text-align:center}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="bulkbar"></div>
<div id="toast"></div>
<script src="engine.js"></script>
<script src="sync.js"></script>
<script>
var Auth=window.HOSTELERO_AUTH, Sync=window.HOSTELERO_SYNC, Fichaje=window.HOSTELERO_FICHAJE;
var app=document.getElementById('app');
var ORDLIST=['Bebidas','Entrantes','Primeros','Segundos','Terceros','Cuartos','Postres'];
var FORMAS=[['cuadrada','Cuadrada'],['redonda','Redonda'],['rectangular','Rectangular'],['ovalada','Ovalada'],['barra','Taburete (barra)']];
var ACC_PERM=[['anular','Anular tickets'],['caja','Abrir / cerrar caja'],['informes','Ver informes'],['descuento','Aplicar descuentos'],['editarCarta','Editar carta'],['usuarios','Gestionar empleados']];
var ROL_PERM=[['admin','Admin'],['encargado','Encargado'],['camarero','Camarero'],['cocina','Cocina']];
var sesion=null, tab='carta', M=null, modalOpen=false, editMods=[], editModsPid=null, editModsField='mods', editPromo=null;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function clone(o){return JSON.parse(JSON.stringify(o||{}));}
function toast(m,ok){var r=document.getElementById('toast');var d=document.createElement('div');d.className='toast '+(ok?'ok':'');d.textContent=m;r.appendChild(d);setTimeout(function(){d.remove();},2400);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function ini(n){return (n||'?').charAt(0).toUpperCase();}
function saveMaster(){ Sync.guardarMaster(M); }

/* ---- login (contraseña) ---- */
function showLogin(){
  app.innerHTML='<div class="login"><div class="lc"><h2>⚙️ Administración</h2><p>Acceso restringido (encargado / administrador)</p>'
    +'<div class="field"><label>Usuario</label><input id="u" autocomplete="off" placeholder="admin"></div>'
    +'<div class="field"><label>Contraseña</label><input id="p" type="password" autocomplete="off"></div>'
    +'<button class="btn" style="width:100%" id="entrar">Entrar</button>'
    +'<p style="margin-top:14px;font-size:12px">Demo: admin / admin</p></div></div>';
  document.getElementById('entrar').onclick=login;
  document.getElementById('p').onkeydown=function(e){if(e.key==='Enter')login();};
}
function login(){
  var u=document.getElementById('u').value.trim(), p=document.getElementById('p').value;
  var ok=Auth.loginAdmin(u,p);
  if(ok){ sesion=ok; render(); } else toast('Usuario o contraseña incorrectos');
}

/* ---- layout ---- */
function render(){
  if(!sesion)return showLogin();
  if(!M) M=clone(Sync.master());
  if(bulk.tab!==tab){ bulk.tab=tab; bulk.ids=[]; }
  var modo=Sync.modo();
  var navs=[['copiloto','🤖 Maître IA'],['config','⚙️ Configuración'],['carta','🍽️ Carta'],['acciones','⚡ Acciones'],['tarifas','💲 Tarifas'],['comentarios','📝 Comentarios'],['promos','🎯 Promociones'],['reservas','📅 Reservas'],['clientes','🧾 Clientes'],['mesas','🪑 Mesas y salas'],['estaciones','🖥️ Estaciones'],['empleados','👤 Empleados'],['impresoras','🖨️ Impresoras'],['fichaje','🕒 Fichajes']];
  var nav=navs.map(function(n){return '<button class="'+(tab===n[0]?'active':'')+'" data-tab="'+n[0]+'">'+n[1]+'</button>';}).join('');
  var body= tab==='copiloto'?viewCopiloto() : tab==='config'?viewConfig() : tab==='carta'?viewCarta() : tab==='acciones'?viewAcciones() : tab==='tarifas'?viewTarifas() : tab==='comentarios'?viewComentarios() : tab==='promos'?viewPromos() : tab==='reservas'?viewReservas() : tab==='clientes'?viewClientes() : tab==='mesas'?viewMesas() : tab==='estaciones'?viewEstaciones() : tab==='empleados'?viewEmpleados() : tab==='impresoras'?viewImpresoras() : viewFichaje();
  app.innerHTML='<div class="app"><aside class="side"><div class="brand">HOSTELERO<small>ADMINISTRACIÓN</small></div>'
    +'<div class="nav">'+nav+'</div><div class="sp"></div><div class="me">'+esc(sesion.nombre)+' · '+esc(Auth.rolInfo(sesion.rol).nombre)+'</div><button class="out" data-act="logout">Cerrar sesión</button></aside>'
    +'<div class="main"><div class="top"><h1>'+({copiloto:'Maître IA',config:'Configuración',carta:'Carta',acciones:'Acciones rápidas',tarifas:'Tarifas',comentarios:'Comentarios',promos:'Promociones',reservas:'Reservas',clientes:'Clientes',mesas:'Mesas y salas',estaciones:'Estaciones / dispositivos',empleados:'Empleados',impresoras:'Impresoras',fichaje:'Registro de jornada'}[tab])+'</h1>'
    +'<span class="modo"><span class="dot" style="background:'+(modo==='servidor'?'#16a34a':'#d97706')+'"></span>'+(modo==='servidor'?'En red (servidor)':'Local')+'</span></div>'
    +'<div class="content">'+body+'</div></div></div>';
  updateBulkBar();
}

/* ---- CARTA ---- */
function viewCarta(){
  var cats=(M.categorias||[]).slice().sort(function(a,b){return a.orden-b.orden;});
  var html='<div class="bar"><h2>Productos</h2><div class="r">'+bulkSelAllBtn()+'<button class="btn ghost" data-act="nuevacat">+ Categoría</button><button class="btn" data-act="nuevoprod">+ Producto</button></div></div>';
  var catName=function(id){var x=cats.filter(function(k){return k.id===id;})[0];return x?x.nombre:'';};
  // ordena: familias principales y debajo sus subfamilias
  var orden=[]; cats.filter(function(c){return !c.padreId;}).forEach(function(p){ orden.push(p); cats.filter(function(s){return s.padreId===p.id;}).forEach(function(s){orden.push(s);}); });
  cats.filter(function(c){return c.padreId&&!cats.some(function(k){return k.id===c.padreId;});}).forEach(function(c){orden.push(c);});
  orden.forEach(function(c){
    var prods=(M.productos||[]).filter(function(p){return p.categoriaId===c.id;});
    var ruta=c.padreId?('<span style="opacity:.8">'+esc(catName(c.padreId))+' › </span>'):'';
    html+='<div class="catgrp" style="background:'+c.color+(c.padreId?';margin-left:18px':'')+'">'+ruta+(c.ic||'')+' '+esc(c.nombre)+' · pase: '+esc(c.pase||'Primeros')+' <button class="btn ghost sm" data-editcat="'+c.id+'" style="float:right;margin-top:-2px">✎ Familia</button></div>';
    html+='<div class="card"><table><thead><tr><th style="width:34px"></th><th>Producto</th><th>Precio</th><th>Coste / margen</th><th>Pase</th><th>Estado</th><th></th></tr></thead><tbody>';
    if(!prods.length) html+='<tr><td colspan="7" style="color:var(--soft)">Sin productos en esta categoría.</td></tr>';
    prods.forEach(function(p){
      var pcell=(p.precio==null)?'<span style="color:var(--soft)">pregunta</span>':p.precio.toFixed(2)+' €';
      var mcell='<span style="color:var(--soft)">—</span>';
      if(p.coste!=null){ var mg=(p.precio!=null&&p.precio>0)?(' · '+Math.round((p.precio-p.coste)/p.precio*100)+'%'):''; mcell=p.coste.toFixed(2)+' €'+mg; }
      html+='<tr><td>'+bulkChk(p.id)+'</td><td><span class="tic">'+(p.ic||'')+'</span> <b>'+esc(p.nombre)+'</b></td><td>'+pcell+'</td><td>'+mcell+'</td>'
        +'<td>'+esc(p.pasePorDefecto||'Primeros')+'</td>'
        +'<td><span class="badge" style="background:'+(p.activo?'#dcfce7':'#fee2e2')+';color:'+(p.activo?'#15803d':'#e11d48')+'">'+(p.activo?'Activo':'Inactivo')+'</span></td>'
        +'<td style="text-align:right">'+(p.esMenu?'<button class="btn ghost sm" data-pasos="'+p.id+'">Pasos</button> ':'<button class="btn ghost sm" data-mods="'+p.id+'">Mods</button> ')+(p.esMenu?'':'<button class="btn ghost sm" data-esc="'+p.id+'" title="Escandallo / receta">🧮 Escandallo</button> ')+'<button class="btn ghost sm" data-copyp="'+p.id+'" title="Crear uno nuevo a partir de este">⧉ Copiar</button> <button class="btn ghost sm" data-editp="'+p.id+'">Editar</button></td></tr>';
    });
    html+='</tbody></table></div>';
  });
  return html;
}
function modalProd(p,copia){
  modalOpen=true; if(!copia) window._copySrc=null;
  var cats=(M.categorias||[]).map(function(c){return '<option value="'+c.id+'"'+(p&&p.categoriaId===c.id?' selected':'')+'>'+esc(c.nombre)+'</option>';}).join('');
  var pases=ORDLIST.map(function(o){return '<option'+((p?(p.pasePorDefecto||'Primeros'):'Primeros')===o?' selected':'')+'>'+o+'</option>';}).join('');
  var preps='<option value="">— Sin preparación —</option>'+(M.preparaciones||[]).map(function(pr){return '<option value="'+pr.id+'"'+(p&&p.preparacion===pr.id?' selected':'')+'>'+esc(pr.nombre)+'</option>';}).join('');
  function nv(x){return (x==null||x==='')?'':x;}
  ov('<h3>'+(copia?'Nuevo producto (copia de '+esc(p.nombre)+')':(p?'Editar producto':'Nuevo producto'))+'</h3><div class="mb" style="max-height:72vh;overflow:auto">'
    +'<div class="row"><div class="field" style="max-width:84px"><label>Icono</label><input id="f_ic" value="'+esc(p?p.ic:'🍽️')+'"></div>'
    +'<div class="field"><label>Nombre</label><input id="f_n" value="'+esc(p?p.nombre:'')+'"></div>'
    +'<div class="field"><label>Familia</label><select id="f_c">'+cats+'</select></div></div>'
    +'<div class="row"><div class="field"><label>Texto en botón</label><input id="f_nb" value="'+esc(nv(p&&p.nombreBoton))+'" placeholder="(usa el nombre)"></div>'
    +'<div class="field"><label>Texto en comanda</label><input id="f_ncom" value="'+esc(nv(p&&p.nombreComanda))+'" placeholder="(usa el nombre)"></div>'
    +'<div class="field"><label>Texto en ticket</label><input id="f_ndoc" value="'+esc(nv(p&&p.nombreDoc))+'" placeholder="(usa el nombre)"></div></div>'
    +'<div class="field"><label>Descripción (carta digital)</label><input id="f_desc" value="'+esc(nv(p&&p.descripcion))+'" placeholder="Ingredientes, alérgenos…"></div>'
    +'<div class="field"><label>Imagen del plato (carta digital)</label>'
      +'<div style="display:flex;gap:10px;align-items:center">'
      +'<img id="f_img_prev" '+((p&&p.imagen)?('src="'+esc(p.imagen)+'"'):'')+' alt="" style="width:54px;height:54px;border-radius:10px;object-fit:cover;border:1px solid var(--line);background:#00000010;flex-shrink:0">'
      +'<input id="f_img" value="'+esc(nv(p&&p.imagen))+'" placeholder="Pega una URL o sube una foto" style="flex:1">'
      +'<button type="button" class="btn ghost" data-act="subirimg" data-file="ff_prod">📁 Subir</button>'
      +'<input type="file" id="ff_prod" class="imgfile" data-target="f_img" data-prev="f_img_prev" accept="image/*" style="display:none">'
      +'</div><div class="muted" style="font-size:11px;margin-top:5px">Foto de stock ya cargada · pega otra URL o sube la tuya</div></div>'
    +'<div style="font-weight:800;font-size:12px;color:var(--soft);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px">Precios — vacío = preguntar · 0 = no se cobra</div>'
    +'<div class="row"><div class="field"><label>Precio principal</label><input id="f_pr" type="number" step="0.10" value="'+(p&&p.precio!=null?p.precio:'')+'"></div>'
    +'<div class="field"><label>Precio como añadido</label><input id="f_pra" type="number" step="0.10" value="'+(p&&p.precioAnadido!=null?p.precioAnadido:'')+'"></div>'
    +'<div class="field"><label>Suplemento en menú</label><input id="f_prs" type="number" step="0.10" value="'+(p&&p.precioSupl!=null?p.precioSupl:'')+'"></div></div>'
    +'<div class="row"><div class="field"><label>Pase por defecto (orden, cambiable con 123)</label><select id="f_pase">'+pases+'</select></div>'
    +'<div class="field"><label>Preparación (a qué cocina/barra va)</label><select id="f_prep">'+preps+'</select></div>'
    +'<div class="field" style="max-width:150px"><label>IVA</label><select id="f_iva"><option value="">Por defecto</option><option value="10"'+(p&&p.iva===10?' selected':'')+'>10%</option><option value="21"'+(p&&p.iva===21?' selected':'')+'>21%</option><option value="4"'+(p&&p.iva===4?' selected':'')+'>4%</option></select></div>'
    +'<div class="field" style="max-width:140px"><label>Disponibilidad</label><input id="f_disp" type="number" value="'+(p&&p.disponibilidad!=null?p.disponibilidad:'')+'" placeholder="∞"></div>'
    +'<div class="field" style="max-width:150px"><label>Coste / escandallo (€)</label><input id="f_coste" type="number" step="0.01" value="'+(p&&p.coste!=null?p.coste:'')+'" placeholder="—"></div></div>'
    +(p&&p.precio!=null&&p.coste!=null&&p.precio>0?'<div style="font-size:12px;color:var(--soft);margin:-2px 0 4px">Margen: <b>'+(p.precio-p.coste).toFixed(2)+' €</b> · '+Math.round((p.precio-p.coste)/p.precio*100)+'% · food cost '+Math.round(p.coste/p.precio*100)+'%</div>':'')
    +'<div style="font-weight:800;font-size:12px;color:var(--soft);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px">Opciones</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">'

function guardarEstacion(id){
  var n=val('es_n').trim(); if(!n)return toast('Pon el nombre');
  if(!M.estaciones)M.estaciones=[];
  var tipo = id ? ((M.estaciones||[]).filter(function(x){return x.id===id;})[0]||{}).tipo : val('es_t');
  var nid = (val('es_id').trim() || (tipo+'-'+n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''))).slice(0,40);
  if((M.estaciones||[]).some(function(x){return x.id===nid && x.id!==id;})) return toast('Ese ID ya existe, usa otro');
  var data={id:nid,tipo:tipo,nombre:n,activa:chk('es_a')};
  data.botonesOcultos=Array.prototype.filter.call(document.querySelectorAll('#es_bot_'+tipo+' .est_bot'),function(x){return !x.checked;}).map(function(x){return x.value;});
  if(tipo==='kds'){
    data.ordenes=Array.prototype.map.call(document.querySelectorAll('.est_ord:checked'),function(x){return x.value;});
    data.preparaciones=Array.prototype.map.call(document.querySelectorAll('.est_prep:checked'),function(x){return x.value;});
    data.acciones=Array.prototype.map.call(document.querySelectorAll('.est_acc:checked'),function(x){return x.value;});
    data.avisarCamareros=chk('es_avisar');
    data.columnas=parseInt(val('es_col'),10)||0;
  }
  if(tipo==='tpv'||tipo==='comandera'){
    data.impresoraTickets=val('es_doc')||undefined;
    data.ticketAuto=val('es_ticketauto')||'preguntar';
    data.impresorasCocina=Array.prototype.map.call(document.querySelectorAll('.est_coc:checked'),function(x){return x.value;});
  }
  if(id) M.estaciones=M.estaciones.map(function(x){return x.id===id?data:x;}); else M.estaciones.push(data);
  saveMaster();cerrar();render();toast('Estación guardada',true);
}

function bulkCfg(){ return BULK[tab]||null; }
function bulkArr(){ var c=bulkCfg(); if(!c)return null; if(!M[c.a])M[c.a]=[]; return M[c.a]; }
function bulkKey(){ var c=bulkCfg(); return (c&&c.k)?c.k:'activo'; }
function bulkAllIds(){ var a=bulkArr(); return a?a.map(function(x){return x.id;}):[]; }
function bulkApply(fn){ var a=bulkArr(); if(a)a.forEach(function(it){ if(bulk.ids.indexOf(it.id)>=0) fn(it); }); }
function bulkChk(id){ return '<input type="checkbox" class="bchk" data-bid="'+esc(id)+'"'+(bulk.ids.indexOf(id)>=0?' checked':'')+'>'; }
function bulkSelAllBtn(){ var all=bulkAllIds(); var todo=all.length&&bulk.ids.length===all.length; return '<button class="btn ghost" data-act="bulkall">'+(todo?'☑ Quitar selección':'☐ Seleccionar todos')+'</button>'; }
function updateBulkBar(){
  var bar=document.getElementById('bulkbar'); if(!bar)return;
  var c=bulkCfg(), n=bulk.ids.length;
  if(!n||!c){ bar.className=''; bar.innerHTML=''; return; }
  var b='';
  if(c.extra){ b+='<button data-bulk="precio">💲 Precio</button><button data-bulk="familia">📂 Familia / pase</button>'; }
  if(c.k){ b+='<button data-bulk="on">✓ Activar</button><button data-bulk="off">✕ Desactivar</button>'; }
  b+='<button data-bulk="dup">⧉ Duplicar</button><button data-bulk="del" class="red">🗑 Eliminar</button>';
  bar.className='on';
  bar.innerHTML='<span class="cnt">'+n+' seleccionados</span>'+b+'<button class="x" data-bulk="clear" title="Quitar selección">✕</button>';

function bulkAction(act){
  if(act==='clear'){ bulk.ids=[]; render(); return; }
  if(!bulk.ids.length) return;
  var arr=bulkArr(); if(!arr) return;
  if(act==='on'||act==='off'){ var k=bulkKey(), v=(act==='on'); bulkApply(function(it){ it[k]=v; }); saveMaster(); render(); toast('Actualizado',true); return; }
  if(act==='dup'){ var add=[]; arr.forEach(function(it){ if(bulk.ids.indexOf(it.id)>=0){ var c=clone(it); c.id=(tab==='estaciones'?((it.tipo||'est')+'-'):'')+uid(); c.nombre=(it.nombre||'')+' (copia)'; add.push(c); } }); Array.prototype.push.apply(arr,add); saveMaster(); bulk.ids=[]; render(); toast(add.length+' duplicado(s)',true); return; }
  if(act==='del'){ if(!confirm('¿Eliminar '+bulk.ids.length+' elemento(s)? No se puede deshacer.')) return; M[bulkCfg().a]=arr.filter(function(it){return bulk.ids.indexOf(it.id)<0;}); saveMaster(); bulk.ids=[]; render(); toast('Eliminados'); return; }
  if(act==='precio'){ bulkPrecioModal(); return; }
  if(act==='familia'){ bulkFamiliaModal(); return; }
}

/* ---- Ordenar tablas al pulsar el encabezado de columna ---- */
function sortTable(th){
  var table=th.closest('table'); if(!table)return;
  var ths=Array.prototype.slice.call(th.parentNode.children), idx=ths.indexOf(th);
  var tbody=table.querySelector('tbody'); if(!tbody)return;
  var rows=Array.prototype.slice.call(tbody.children).filter(function(r){return r.children.length>idx;});
  if(rows.length<2)return;
  var dir=(th.getAttribute('data-dir')==='asc')?'desc':'asc';
  ths.forEach(function(x){x.removeAttribute('data-dir');}); th.setAttribute('data-dir',dir);
  function cv(r){ return (r.children[idx]?r.children[idx].textContent:'').trim(); }
  function num(t){ var s=t.replace(/[^0-9,.\-]/g,'').replace(',','.'); var f=parseFloat(s); return (s===''||isNaN(f))?null:f; }
  rows.sort(function(a,b){ var x=cv(a),y=cv(b),nx=num(x),ny=num(y),r; if(nx!==null&&ny!==null) r=nx-ny; else r=x.localeCompare(y,'es',{sensitivity:'base',numeric:true}); return dir==='asc'?r:-r; });
  rows.forEach(function(r){tbody.appendChild(r);});
}

function viewFichaje(){

  var html='<div class="bar"><h2>Registro de jornada · hoy</h2></div><div class="card"><table><thead><tr><th>Empleado</th><th>Fichajes de hoy</th><th>Trabajado</th></tr></thead><tbody>';

  });

    disponibilidad:(val('f_disp')===''?undefined:(parseInt(val('f_disp'),10)||0)),

function _recetaLeerDOM(){ if(!window._receta)return; document.querySelectorAll('.rec_row').forEach(function(el){ var i=+el.dataset.i; window._receta[i]={ing:el.querySelector('.rec_ing').value,cant:el.querySelector('.rec_cant').value,coste:parseFloat(el.querySelector('.rec_coste').value)||0}; }); }
function modalEscandallo(p){
  modalOpen=true; window._recetaPid=p.id;
  if(!window._receta) window._receta=(p.receta?JSON.parse(JSON.stringify(p.receta)):[]);
  var total=window._receta.reduce(function(s,l){return s+(parseFloat(l.coste)||0);},0);
  var rows=window._receta.map(function(l,i){
    return '<div class="rec_row row" data-i="'+i+'" style="gap:6px;align-items:center"><input class="rec_ing" value="'+esc(l.ing||'')+'" placeholder="Ingrediente" style="flex:2"><input class="rec_cant" value="'+esc(l.cant||'')+'" placeholder="Cantidad" style="flex:1"><input class="rec_coste" type="number" step="0.01" value="'+(l.coste!=null?l.coste:'')+'" placeholder="Coste €" style="max-width:110px"><button class="btn ghost sm" data-recdel="'+i+'">✕</button></div>';
  }).join('') || '<p class="muted">Sin ingredientes. Añade líneas para calcular el coste.</p>';
  var pvp=(p.precio!=null&&p.precio>0)?p.precio:null;
  var margen=pvp!=null?('<div style="font-size:13px;color:var(--soft);margin-top:6px">PVP '+pvp.toFixed(2)+' € · Margen <b>'+(pvp-total).toFixed(2)+' €</b> ('+Math.round((pvp-total)/pvp*100)+'%) · food cost '+Math.round(total/pvp*100)+'%</div>'):'';
  ov('<h3>🧮 Escandallo · '+esc(p.nombre)+'</h3><div class="mb" style="max-height:70vh;overflow:auto">'
    +rows
    +'<button class="btn ghost" data-act="recadd" style="margin-top:6px">+ Ingrediente</button>'
    +'<div style="margin-top:12px;font-weight:800;font-size:16px">Coste total: '+total.toFixed(2)+' €</div>'+margen
    +'</div><div class="foot"><button class="btn ghost" data-act="cerrar">Cancelar</button><button class="btn" data-act="saveescandallo" data-id="'+p.id+'">Guardar (fija el coste)</button></div>');
}
function guardarEscandallo(id){
  _recetaLeerDOM();
  var receta=(window._receta||[]).filter(function(l){return (l.ing&&l.ing.trim())||l.coste;});
  var total=receta.reduce(function(s,l){return s+(parseFloat(l.coste)||0);},0);
  M.productos=M.productos.map(function(p){return p.id===id?Object.assign({},p,{receta:receta,coste:Math.round(total*100)/100}):p;});
  window._receta=null;window._recetaPid=null;
  saveMaster();cerrar();render();toast('Escandallo guardado',true);
}

/* ---- COPILOTO IA: análisis + propuestas aplicables ---- */
function copilotoPropuestas(){
  var prods=(M.productos||[]).filter(function(p){return !p.esMenu;});
  var v7=M.ventas7d||{};
  var props=[];
  // 1) Precios con margen bajo (food cost alto) — prioriza los más vendidos
  prods.forEach(function(p){
    if(p.coste!=null && p.precio!=null && p.precio>0){
      var fc=p.coste/p.precio; // food cost
      if(fc>0.40){
        var nuevo=Math.ceil((p.coste/0.38)*10)/10; // objetivo food cost 38%
        if(nuevo>p.precio){
          var vt=v7[p.id]||0, estrella=vt>=30;
          props.push({ic:estrella?'⭐':'📈',c:'#16a34a',prio:estrella?2:1,t:(estrella?'Prioridad: sube ':'Sube el precio de ')+esc(p.nombre),
            d:'Food cost '+Math.round(fc*100)+'% (alto) → a '+nuevo.toFixed(2)+' € baja al 38% y el margen sube a '+Math.round((1-p.coste/nuevo)*100)+'%.'+(estrella?(' Y es de tus MÁS vendidos ('+vt+' uds/sem): impacto alto.'):''),
            imp:(estrella?'★ superventas · ':'')+'+'+((nuevo-p.precio)).toFixed(2)+' € / unidad',
            btn:'Aplicar precio '+nuevo.toFixed(2)+' €',act:'cop_precio',pid:p.id,val:nuevo});
        }
      }
    }
  });
  props.sort(function(a,b){return (b.prio||0)-(a.prio||0);});
  // 2) Productos sin escandallo (no se puede optimizar margen)
  var sinCoste=prods.filter(function(p){return p.coste==null && p.precio!=null;});
  sinCoste.slice(0,4).forEach(function(p){
    props.push({ic:'🧮',c:'#7c3aed',t:'Completa el escandallo de '+esc(p.nombre),
      d:'Sin coste no puedo calcular su margen ni proponer precio. Define el coste de sus ingredientes y entrará en la optimización automática.',
      imp:'Desbloquea optimización de margen',btn:'Abrir escandallo',act:'cop_esc',pid:p.id});
  });
  // 2b) Producto lento (poca rotación)
  var lentos=prods.filter(function(p){return p.activo!==false && p.precio!=null && v7[p.id]!=null && v7[p.id]<=10;}).sort(function(a,b){return (v7[a.id]||0)-(v7[b.id]||0);});
  lentos.slice(0,2).forEach(function(p){
    props.push({ic:'🐌',c:'#e11d48',t:esc(p.nombre)+' se vende poco',
      d:'Solo '+(v7[p.id]||0)+' uds en 7 días. Valora promocionarlo, cambiarlo de sitio en la carta o retirarlo.',
      imp:'Limpia y enfoca la carta',btn:'',act:''});
  });
  // 2c) Producto estrella (info)
  var top=prods.slice().sort(function(a,b){return (v7[b.id]||0)-(v7[a.id]||0);})[0];
  if(top && (v7[top.id]||0)>0){
    props.push({ic:'🏆',c:'#d97706',t:'Tu superventas: '+esc(top.nombre),
      d:(v7[top.id])+' uds en 7 días. No te quedes sin stock en hora punta y dale visibilidad en la carta.',
      imp:'Protege tu best-seller',btn:'',act:''});
  }
  // 3) Demanda del día (reservas) -> tarifa de hora punta
  var hoy=hoyStr();
  var resHoy=(Sync.reservas?Sync.reservas():[]).filter(function(r){return r.fecha===hoy && r.estado!=='cancelada' && r.estado!=='noshow';});
  var cub=resHoy.reduce(function(s,r){return s+(parseInt(r.personas,10)||0);},0);
  if(cub>=6){
    var horas={}; resHoy.forEach(function(r){var h=(r.hora||'').slice(0,2);horas[h]=(horas[h]||0)+(parseInt(r.personas,10)||0);});
    var pico=Object.keys(horas).sort(function(a,b){return horas[b]-horas[a];})[0]||'';
    var tInact=(M.tarifas||[]).filter(function(t){return t.activa===false;})[0];
    if(tInact){
      props.push({ic:'⚡',c:'#d97706',t:'Día fuerte: activa una tarifa de hora punta',
        d:cub+' cubiertos reservados hoy (pico a las '+pico+':00). Activa la tarifa «'+esc(tInact.nombre)+'» para aprovechar la demanda.',
        imp:'Más ingreso por cubierto en pico',btn:'Activar «'+esc(tInact.nombre)+'»',act:'cop_tarifa',tid:tInact.id});
    } else {
      props.push({ic:'⚡',c:'#d97706',t:'Día fuerte previsto',
        d:cub+' cubiertos reservados hoy (pico a las '+pico+':00). Refuerza cocina y sala en esa franja y revisa el stock de los platos estrella.',
        imp:'Anticipa el pico de servicio',btn:'',act:''});
    }
  }
  // 4) Personal vs demanda (fichaje)
  var dentro=(Auth.usuarios?Auth.usuarios():[]).filter(function(u){try{return Fichaje&&Fichaje.estado&&Fichaje.estado(u.id)==='dentro';}catch(e){return false;}}).length;
  if(cub>=10 && dentro>0){
    props.push({ic:'👥',c:'#0891b2',t:'Ajusta el turno a la demanda',
      d:'Hoy hay '+cub+' cubiertos reservados y '+dentro+' persona(s) fichadas ahora. Valora reforzar el turno de la franja punta.',
      imp:'Mejor servicio sin sobrecostes',btn:'',act:''});
  }
  return props;
}
function viewCopiloto(){
  var prods=(M.productos||[]).filter(function(p){return !p.esMenu;});
  var conCoste=prods.filter(function(p){return p.coste!=null;});
  var margenes=conCoste.filter(function(p){return p.precio>0;}).map(function(p){return (p.precio-p.coste)/p.precio;});
  var margMedio=margenes.length?Math.round(margenes.reduce(function(s,m){return s+m;},0)/margenes.length*100):null;
  var pctEsc=prods.length?Math.round(conCoste.length/prods.length*100):0;
  var hoy=hoyStr();
  var resHoy=(Sync.reservas?Sync.reservas():[]).filter(function(r){return r.fecha===hoy && r.estado!=='cancelada' && r.estado!=='noshow';});
  var cub=resHoy.reduce(function(s,r){return s+(parseInt(r.personas,10)||0);},0);
  var agot=(Sync.agotados?Sync.agotados():[]).length;
  var props=copilotoPropuestas();
  function kpi(v,l,c){return '<div class="card pad" style="text-align:center;flex:1"><div style="font-size:30px;font-weight:900;color:'+c+'">'+v+'</div><div class="muted" style="font-size:12px;margin-top:2px">'+l+'</div></div>';}
  var h='<div class="card pad" style="background:linear-gradient(160deg,#0f766e,#0f172a);color:#fff;margin-bottom:16px">'
    +'<div style="display:flex;align-items:center;gap:12px"><img src="brand/mark.svg" style="width:44px;height:44px"><div><div style="font-weight:900;font-size:19px">El Maître · IA de HOSTELERO</div>'
    +'<div style="color:#5eead4;font-size:13px">Analiza tu negocio y te propone mejoras concretas, aplicables con un clic.</div></div></div></div>';
  h+='<div style="margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><button class="btn" onclick="maiDemo()">🎬 Cargar escenario de demostración</button><span class="muted" style="font-size:12px">Inyecta crucero, evento, reservas y ventas de ejemplo para que el Maître luzca en presentaciones.</span></div>';
  h+='<div class="row" style="gap:12px;margin-bottom:16px">'+kpi(prods.length,'Productos','#0f172a')+kpi(pctEsc+'%','Con escandallo','#7c3aed')+kpi(margMedio==null?'—':margMedio+'%','Margen medio','#16a34a')+kpi(cub,'Cubiertos hoy','#0891b2')+kpi(agot,'Agotados (86)','#e11d48')+'</div>';
  h+='<h2 style="font-size:16px;margin:6px 0 12px">Propuestas del Maître ('+props.length+')</h2>';
  if(!props.length){
    h+='<div class="card pad muted">Todo en orden por ahora. Completa los escandallos y registra reservas para recibir más propuestas.</div>';
  } else {
    h+=props.map(function(p){
      var btn=p.btn?('<button class="btn" data-act="'+p.act+'"'+(p.pid?(' data-pid="'+p.pid+'"'):'')+(p.tid?(' data-tid="'+p.tid+'"'):'')+(p.val!=null?(' data-val="'+p.val+'"'):'')+'>'+p.btn+'</button>'):'';
      return '<div class="card pad" style="margin-bottom:10px;display:flex;gap:14px;align-items:flex-start">'
        +'<div style="font-size:26px;line-height:1">'+p.ic+'</div>'
        +'<div style="flex:1"><div style="font-weight:800;font-size:15px">'+p.t+'</div>'
        +'<div class="muted" style="font-size:13px;margin:3px 0 6px">'+p.d+'</div>'
        +'<span class="badge" style="background:'+p.c+'22;color:'+p.c+'">'+esc(p.imp)+'</span></div>'
        +'<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">'+btn+'</div></div>';
    }).join('');
  }
