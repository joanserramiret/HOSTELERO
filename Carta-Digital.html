<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Carta · HOSTELERO</title>
<script src="brand.js"></script>
<style>
:root{
  --bg:#fbf7f0;--cream:#fffdf9;--ink:#2b2118;--soft:#9a8b7c;--line:#ece2d3;
  --terr:#b4532a;--terrD:#8f3f1f;--gold:#c79a3f;--green:#3f6b4e;
  --serif:'Georgia','Times New Roman',serif;--shadow:0 14px 36px rgba(74,49,28,.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation;-webkit-user-select:none;user-select:none}
html,body{margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
img{display:block}
.app{max-width:720px;margin:0 auto;padding-bottom:130px}
/* hero */
.hero{position:relative;height:280px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;overflow:hidden}
.hero .cover{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.02)}
.hero .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,12,6,.15) 0%,rgba(20,12,6,.25) 45%,rgba(20,12,6,.82) 100%)}
.hero .in{position:relative;padding:0 22px max(22px,env(safe-area-inset-bottom))}
.hero .badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.25);
  padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.hero .badge img{width:16px;height:16px;border-radius:4px}
.hero h1{font-family:var(--serif);font-weight:700;font-size:40px;line-height:1.05;margin:12px 0 4px;text-shadow:0 2px 18px rgba(0,0,0,.4)}
.hero .sub{font-size:14px;color:#f0e7da;opacity:.95}
/* chips */
.chips{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg),var(--bg) 72%,transparent);display:flex;gap:9px;overflow-x:auto;padding:14px 18px 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:9px 16px;border-radius:999px;background:var(--cream);border:1px solid var(--line);color:var(--ink);font-weight:700;font-size:14px;box-shadow:0 2px 6px rgba(74,49,28,.05)}
.chip.active{background:var(--terr);border-color:var(--terr);color:#fff}
/* familia */
.fam{padding:20px 18px 4px}
.fam .k{font-size:11px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold)}
.fam h2{font-family:var(--serif);font-weight:700;font-size:27px;margin:4px 0 0;display:flex;align-items:center;gap:10px}
.fam .rule{height:2px;width:60px;background:linear-gradient(90deg,var(--terr),transparent);border-radius:2px;margin-top:10px}
/* tarjeta plato */
.grid{padding:8px 14px 0;display:flex;flex-direction:column;gap:12px}
.dish{display:flex;gap:14px;align-items:stretch;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 4px 14px rgba(74,49,28,.05)}
.dish.off{opacity:.62}
.ph{position:relative;flex-shrink:0;width:98px;height:98px;border-radius:14px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:38px;color:#fff}
.ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.dish .b{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.dish .n{font-family:var(--serif);font-weight:700;font-size:18px;line-height:1.2}
.dish .d{color:var(--soft);font-size:13px;margin-top:4px;line-height:1.45}
.dish .pr{align-self:flex-end;margin-top:8px;font-weight:800;font-size:17px;color:var(--terr);white-space:nowrap;font-variant-numeric:tabular-nums}
.ag{display:inline-block;margin-left:7px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#fff;background:#b04b3a;padding:2px 8px;border-radius:999px;vertical-align:middle}
.empty{text-align:center;color:var(--soft);padding:80px 20px}
/* fab */
.fab{position:fixed;left:50%;transform:translateX(-50%);bottom:max(20px,env(safe-area-inset-bottom));z-index:40;display:flex;align-items:center;gap:9px;
  background:var(--terr);color:#fff;font-weight:800;font-size:16px;border:none;border-radius:999px;padding:15px 28px;box-shadow:0 16px 34px rgba(180,83,42,.45)}
.fab:active{transform:translateX(-50%) scale(.97)}
.foot{text-align:center;color:var(--soft);font-size:12px;padding:30px 16px 0}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(43,33,24,.55);display:flex;align-items:flex-end;justify-content:center;z-index:60;backdrop-filter:blur(3px)}
.sheet{background:var(--cream);border-radius:26px 26px 0 0;width:100%;max-width:560px;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom));box-shadow:var(--shadow)}
.sheet .grip{width:44px;height:5px;border-radius:3px;background:var(--line);margin:-8px auto 16px}
.sheet h3{font-family:var(--serif);margin:0 0 4px;font-size:24px;font-weight:700}
.sheet p.mut{margin:0 0 18px;color:var(--soft);font-size:13.5px}
.row{display:flex;gap:10px;margin-bottom:12px}
.field{flex:1;min-width:0}
label{display:block;font-size:12px;color:var(--soft);font-weight:700;margin-bottom:6px}
input{width:100%;padding:14px;border-radius:13px;background:#fff;border:1px solid var(--line);color:var(--ink);font-size:16px}
input:focus{outline:none;border-color:var(--terr)}
.send{width:100%;padding:16px;border-radius:14px;background:var(--terr);color:#fff;font-weight:800;font-size:17px;border:none;margin-top:8px}
.ghost{background:none;border:none;color:var(--soft);font-weight:700;display:block;margin:12px auto 0;padding:8px}
.ok{text-align:center;padding:18px 0}.ok .big{font-size:52px}
</style>
</head>
<body>
<div style="height:4px;background:linear-gradient(90deg,#0f766e,#14b8a6,#f59e0b);position:sticky;top:0;z-index:50"></div>
<div class="app">
  <div class="hero" id="hero">
    <div class="cover" id="cover"></div><div class="shade"></div>
    <div class="in">
      <span class="badge"><img alt="" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230F766E'/%3E%3Cstop offset='1' stop-color='%2314B8A6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='16' y='16' width='480' height='480' rx='118' fill='url(%23g)'/%3E%3Crect x='150' y='156' width='48' height='200' rx='16' fill='%23fff'/%3E%3Crect x='314' y='156' width='48' height='200' rx='16' fill='%23fff'/%3E%3Crect x='150' y='232' width='212' height='48' rx='16' fill='%23fff'/%3E%3Ccircle cx='384' cy='150' r='40' fill='%230F172A'/%3E%3Ccircle cx='384' cy='150' r='34' fill='%23F59E0B'/%3E%3C/svg%3E"> Carta digital</span>
      <h1 id="nom">Nuestra carta</h1>
      <div class="sub" id="sub">Descubre nuestros platos · reserva tu mesa</div>
    </div>
  </div>
  <div class="chips" id="chips"></div>
  <div id="carta"></div>
  <div class="foot">Carta en tiempo real · HOSTELERO</div>
</div>
<button class="fab" id="fab"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4.5" width="18" height="17" rx="3"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg> Reservar mesa</button>
<div id="modal"></div>
<script src="sync.js"></script>
<script>
var Sync=window.HOSTELERO_SYNC;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function shade(hex,p){ hex=(hex||'#b4532a').replace('#',''); if(hex.length===3)hex=hex.replace(/./g,'$&$&'); var n=parseInt(hex,16),r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*p);g=Math.round(g*p);b=Math.round(b*p); return 'rgb('+r+','+g+','+b+')'; }
function fams(){
  var m=Sync.master(); if(!(m&&m.categorias&&m.productos))return [];
  return m.categorias.slice().sort(function(a,b){return (a.orden||0)-(b.orden||0);}).map(function(c){
    return {id:c.id,nombre:c.nombre,ic:c.ic||'',pase:c.pase||'',color:c.color||'#b4532a',
      items:m.productos.filter(function(p){return p.categoriaId===c.id&&p.activo!==false;})};
  }).filter(function(c){return c.items.length;});
}
function precioTxt(p){ if(p.precio==null)return 'Consultar'; var t=p.precio.toFixed(2).replace('.',',')+' €'; if(p.porPeso)t+=' /kg'; return t; }
function dishCard(p,color){
  var ago=Sync.estaAgotado&&Sync.estaAgotado(p.id);
  var grad='background:linear-gradient(145deg,'+shade(color,1.05>1?1:1)+','+shade(color,.62)+')';
  var ph='<div class="ph" style="'+grad+'"><span>'+esc(p.ic||'🍽️')+'</span>'+(p.imagen?('<img loading="lazy" alt="" src="'+esc(p.imagen)+'" onerror="this.remove()">'):'')+'</div>';
  return '<div class="dish'+(ago?' off':'')+'">'+ph+'<div class="b"><div class="n">'+esc(p.nombreBoton||p.nombre)+(ago?'<span class="ag">agotado</span>':'')+'</div>'
    +(p.descripcion?'<div class="d">'+esc(p.descripcion)+'</div>':'')+'<div class="pr">'+precioTxt(p)+'</div></div></div>';
}
function render(){
  var F=fams(), m=Sync.master();
  var emp=(m&&m.config&&m.config.empresa)||{};
  if(emp.nombre)document.getElementById('nom').textContent=emp.nombre;
  if(emp.direccion||emp.poblacion)document.getElementById('sub').textContent=[emp.direccion,emp.poblacion].filter(Boolean).join(' · ')+' · reserva tu mesa';
  var cover=document.getElementById('cover');
  cover.style.background= emp.portada ? ("center/cover no-repeat url('"+emp.portada+"')") : 'linear-gradient(145deg,#7a3b22,#2b1b12)';
  if(!F.length){document.getElementById('carta').innerHTML='<div class="empty">Cargando la carta…</div>';document.getElementById('chips').innerHTML='';return;}
  document.getElementById('chips').innerHTML=F.map(function(c,i){return '<button class="chip'+(i===0?' active':'')+'" data-cat="'+i+'">'+esc((c.ic?c.ic+' ':'')+c.nombre)+'</button>';}).join('');
  document.getElementById('carta').innerHTML=F.map(function(c,i){
    return '<section class="famsec" id="fam'+i+'"><div class="fam"><span class="k">'+esc(c.pase||'Carta')+'</span><h2>'+(c.ic?esc(c.ic)+' ':'')+esc(c.nombre)+'</h2><div class="rule"></div></div>'
      +'<div class="grid">'+c.items.map(function(p){return dishCard(p,c.color);}).join('')+'</div></section>';
  }).join('');
}
function hoy(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function modalReserva(){
  var html='<div class="overlay" id="ov"><div class="sheet" data-stop><div class="grip"></div>'
    +'<h3>Reservar mesa</h3><p class="mut">Te enviamos la solicitud al restaurante. Te confirmarán la reserva enseguida.</p>'
    +'<div class="row"><div class="field"><label>Fecha</label><input id="r_f" type="date" value="'+hoy()+'"></div>'
    +'<div class="field"><label>Hora</label><input id="r_h" type="time" value="14:00"></div>'
    +'<div class="field" style="max-width:92px"><label>Personas</label><input id="r_p" type="number" min="1" value="2"></div></div>'
    +'<div class="row"><div class="field"><label>Tu nombre</label><input id="r_c" placeholder="Nombre"></div>'
    +'<div class="field"><label>Teléfono</label><input id="r_t" placeholder="Móvil"></div></div>'
    +'<div class="field" style="margin-bottom:4px"><label>Notas (alergias, trona…)</label><input id="r_n" placeholder="Opcional"></div>'
    +'<button class="send" id="r_ok">Enviar solicitud</button><button class="ghost" id="r_x">Cancelar</button></div></div>';
  var d=document.createElement('div');d.innerHTML=html;document.body.appendChild(d.firstChild);
  document.getElementById('ov').addEventListener('click',function(e){if(e.target.id==='ov')cerrar();});
  document.getElementById('r_x').addEventListener('click',cerrar);
  document.getElementById('r_ok').addEventListener('click',enviar);
}
function cerrar(){var o=document.getElementById('ov');if(o)o.remove();}
function enviar(){
  var f=document.getElementById('r_f').value, h=document.getElementById('r_h').value, c=document.getElementById('r_c').value.trim();
  if(!f||!h){alert('Indica fecha y hora');return;}
  if(!c){alert('Indica tu nombre');return;}
  Sync.guardarReserva({fecha:f,hora:h,personas:parseInt(document.getElementById('r_p').value,10)||2,
    cliente:c,telefono:document.getElementById('r_t').value.trim(),notas:document.getElementById('r_n').value.trim(),origen:'carta',estado:'pendiente'});
  var sh=document.querySelector('#ov .sheet');
  sh.innerHTML='<div class="grip"></div><div class="ok"><div class="big">✅</div><h3>¡Solicitud enviada!</h3><p class="mut">El restaurante te confirmará la reserva en breve. ¡Gracias!</p><button class="send" id="r_close">Cerrar</button></div>';
  document.getElementById('r_close').addEventListener('click',cerrar);
}
document.getElementById('fab').addEventListener('click',modalReserva);
document.getElementById('chips').addEventListener('click',function(e){var t=e.target.closest('[data-cat]');if(!t)return;
  document.querySelectorAll('.chip').forEach(function(b){b.classList.toggle('active',b===t);});
  var sec=document.getElementById('fam'+t.dataset.cat); if(sec)window.scrollTo({top:sec.offsetTop-58,behavior:'smooth'});
});
Sync.onChange(render);
render();
</script>
</body>
</html>
