<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HOSTELERO · Comandera</title>
<script src="brand.js"></script>
<script src="maitre.js" defer></script>
<style>
:root{--bg:#0b0f17;--card:#161d2b;--card2:#1d2636;--line:#2a3446;--text:#eef2f8;--soft:#8c97ab;
--primary:#5b6cff;--primaryd:#4453e6;--green:#19b562;--amber:#e0a020;--red:#e0436a;--shadow:0 14px 40px rgba(0,0,0,.5)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;transition:transform .08s,background .15s}
button:active{transform:scale(.96)}
.app{height:100vh;height:100dvh;display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:12px;padding:max(14px,env(safe-area-inset-top)) 16px 14px;background:#0f1622;border-bottom:1px solid var(--line);flex-shrink:0}
.top h1{font-size:18px;font-weight:800;margin:0}
.top .sub{color:var(--soft);font-size:12px;font-weight:700}
.top .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.back{background:var(--card2);border:1px solid var(--line);color:#fff;border-radius:10px;padding:9px 13px;font-weight:800}
.body{flex:1;overflow:auto;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.h2{font-size:14px;color:var(--soft);font-weight:700;margin:0 0 14px;text-align:center}
/* login */
.center{height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px}
.lcard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px;max-width:380px;width:100%;box-shadow:var(--shadow);text-align:center}
.lcard h2{margin:0 0 4px;font-size:22px}
.lcard p{color:var(--soft);font-size:13px;margin:0 0 18px}
.users{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.u{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;color:#fff;min-width:96px}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:21px;color:#fff}
.dots{display:flex;gap:12px;justify-content:center;margin:16px 0}
.d{width:16px;height:16px;border-radius:50%;border:2px solid var(--line)}.d.on{background:var(--primary);border-color:var(--primary)}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kp button{padding:20px;font-size:24px;font-weight:800;background:var(--card2);border:1px solid var(--line);border-radius:14px;color:#fff}
.link{background:none;color:var(--soft);font-weight:700;margin-top:14px;padding:8px}
/* mesas */
.salatabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.salatab{padding:10px 16px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--soft);font-weight:800;white-space:nowrap}
.salatab.active{background:#fff;color:#0b0f17;border-color:#fff}
.mesas{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.mesa{aspect-ratio:1;border-radius:16px;background:var(--card2);border:1px solid var(--line);color:#fff;font-weight:900;font-size:20px;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px}
.mesa.peque{font-size:13px}
/* plano dibujado */
.planowrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:16px;background:#11161f}
.plano{position:relative}
.pmesa{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:2px solid rgba(0,0,0,.18);background:#e8edf5;color:#10243f;font-weight:900;box-shadow:0 4px 10px rgba(0,0,0,.25);font-size:13px;padding:4px;touch-action:none;user-select:none;-webkit-user-select:none}
.pmesa.unida{outline:2px dashed var(--teal,#0f766e);outline-offset:2px}
.pmesa .lk{position:absolute;top:-7px;left:-7px;font-size:13px}
.pmesa.drag{z-index:60;box-shadow:0 14px 30px rgba(0,0,0,.55);outline:3px solid #14b8a6}
.pmesa.tgt{outline:3px solid #f59e0b;outline-offset:2px}
.pmesa .pnm{font-size:14px;font-weight:900}
.pmesa .ppax{font-size:10px;font-weight:700;color:#3a5170}
.pmesa.ocupada{background:#ffe0b0;color:#7a3d00}
.pmesa.ocupada .ppax{color:#9a5b13}
.pmesa.avisa{background:var(--amber);color:#1a1205;animation:pulse 1.1s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 6px rgba(224,160,32,.35)}}
.pdecor{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;color:#0b0f17;font-weight:800;font-size:11px;opacity:.92}
.pdecor .dic{font-size:22px;line-height:1}
/* comanda */
.cattabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
.cattab{padding:11px 18px;border-radius:999px;color:#fff;font-weight:800;white-space:nowrap;opacity:.55;font-size:15px}
.cattab.active{opacity:1}
.prods{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:11px;margin-bottom:14px}
.prod{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:14px 8px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;min-height:104px;justify-content:center}
.prod .pic{font-size:32px}.prod .pn{font-size:13px;font-weight:700;line-height:1.15;text-align:center}.prod .pp{font-weight:900;color:#a9b4ff;font-size:14px}
.prod.agotado{opacity:.45;filter:grayscale(.7)}.prod.agotado .pp{color:var(--red)}
.dispbtn{padding:14px 16px;border-radius:14px;background:#3a1620;color:#ff9db4;font-weight:900;font-size:15px;border:1px solid #5a2230}
.disprow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:#fff;font-weight:700;width:100%;margin-bottom:8px}
.disprow.off{background:#3a1620;border-color:#5a2230;color:#ff9db4;text-decoration:line-through}
.disprow .tag{font-size:11px;font-weight:900;padding:4px 9px;border-radius:999px;background:#19b562;color:#04210f}
.disprow.off .tag{background:var(--red);color:#fff}
.btn123{padding:14px 18px;border-radius:14px;background:#fff;color:#0b0f17;font-weight:900;font-size:17px;letter-spacing:1px}
.ordbar{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;padding:11px 14px;border-radius:12px;margin-bottom:12px;font-size:14px}
.ordbar button{margin-left:auto;background:rgba(255,255,255,.25);color:#fff;border-radius:9px;padding:6px 11px;font-weight:800;font-size:12px}
/* panel comanda fijo abajo */
.cmd{background:var(--card);border-top:1px solid var(--line);flex-shrink:0;max-height:42vh;display:flex;flex-direction:column}
.cmd .lst{overflow:auto;padding:6px 0}
.ohead{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fff;padding:5px 16px;margin:4px 0 0;border-radius:5px}
.cl{display:flex;align-items:center;gap:10px;padding:9px 16px}
.cl .n{flex:1;font-weight:700;font-size:15px}
.cl .lsub{font-size:12px;color:var(--soft);font-weight:600;margin-top:2px}
.cl .lpr{color:#a9b4ff}
.cl .limp{font-weight:800;font-size:14px;min-width:62px;text-align:right}
.cmdtot{display:flex;justify-content:space-between;padding:8px 16px 2px;color:var(--soft);font-weight:700;font-size:13px}
.cmdtot b{color:#fff;font-size:16px}
.q{width:34px;height:34px;border-radius:9px;background:var(--card2);border:1px solid var(--line);color:#fff;font-size:19px;font-weight:800;display:flex;align-items:center;justify-content:center}
.cl .qn{width:24px;text-align:center;font-weight:800}
.cmd .foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
.enviar{flex:1;padding:16px;border-radius:14px;background:var(--green);color:#fff;font-weight:900;font-size:17px}
.enviar:disabled{opacity:.4}
.empty{color:var(--soft);text-align:center;padding:20px;font-weight:600;font-size:14px}
/* modal 123 */
.overlay{position:fixed;inset:0;background:rgba(5,8,14,.75);display:flex;align-items:flex-end;justify-content:center;z-index:50}
.sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:520px;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom));box-shadow:var(--shadow)}
.sheet h3{margin:0 0 14px;font-size:18px;text-align:center}
.opt{display:flex;align-items:center;gap:12px;padding:15px 16px;border:1px solid var(--line);border-radius:13px;background:var(--card2);color:#fff;font-weight:800;font-size:17px;width:100%;margin-bottom:9px}
.opt .oc{width:18px;height:18px;border-radius:50%}
.opt.active{box-shadow:inset 0 0 0 2px var(--primary)}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;width:90%;max-width:420px}
.toast{background:#0e1422;border:1px solid var(--line);padding:13px 18px;border-radius:13px;font-weight:700;box-shadow:var(--shadow);text-align:center;width:100%}
.toast.av{background:var(--amber);color:#1a1205;border:none;font-weight:900}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script src="engine.js"></script>
<script src="sync.js"></script>
<script>
var Auth=window.HOSTELERO_AUTH, Sync=window.HOSTELERO_SYNC;
var app=document.getElementById('app');
var ORD={Bebidas:'#0ea5e9',Entrantes:'#16a34a',Primeros:'#2563eb',Segundos:'#7c3aed',Terceros:'#0891b2',Cuartos:'#9333ea',Postres:'#db2777'};
var ORDLIST=['Bebidas','Entrantes','Primeros','Segundos','Terceros','Cuartos','Postres'];
var CARTA=[
 {cat:'Bebidas',pase:'Bebidas',color:'#0ea5e9',items:[['Caña','🍺',1.8],['Doble','🍺',2.6],['Refresco','🥤',2.2],['Agua 50cl','💧',1.5],['Copa Vino','🍷',2.4],['Café','☕',1.3],['Cerveza Sin','🍺',2.4],['Tónica','🍸',2.5]]},
 {cat:'Entrantes',pase:'Entrantes',color:'#16a34a',items:[['Ensalada','🥗',6.5],['Gazpacho','🍅',4.5],['Croquetas','🧆',6.0],['Bravas','🍟',4.5],['Ensaladilla','🥔',4.0],['Pimientos','🌶️',5.0]]},
 {cat:'Principales',pase:'Segundos',color:'#7c3aed',items:[['Entrecot','🥩',18],['Solomillo','🥩',21],['Pollo','🍗',12],['Paella','🥘',16],['Calamares','🦑',11],['Pulpo','🐙',17],['Gambas','🦐',12.5]]},
 {cat:'Postres',pase:'Postres',color:'#db2777',items:[['Tarta Queso','🍰',5],['Flan','🍮',3.8],['Coulant','🍫',5.5],['Helado','🍨',3.5],['Fruta','🍓',3]]}
];
var SALAS=[
 {n:'Comedor',mesas:['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12']},
 {n:'Terraza',mesas:['T1','T2','T3','T4','T5','T6','T7','T8']},
 {n:'Barra',mesas:['B1','B2','B3','B4','B5','B6']},
 {n:'Reservado',mesas:['Reservado A','Reservado B']}
];
/* Carta y mesas: del SERVIDOR (datos maestros) si están; si no, demo embebida */
function getCARTA(){
  var m=Sync.master();
  if(m&&m.productos&&m.productos.length&&m.categorias&&m.categorias.length){
    return m.categorias.slice().sort(function(a,b){return (a.orden||0)-(b.orden||0);}).map(function(c){
      return {cat:c.nombre,pase:c.pase||'Primeros',color:c.color||'#5b6cff',
        items:m.productos.filter(function(p){return p.categoriaId===c.id&&p.activo!==false;}).map(function(p){return [p.nombre,p.ic||'🍽️',(p.precio==null?null:p.precio),p.pasePorDefecto||c.pase||'Primeros',p.id,c.id,p.nombreBoton,p.nombreComanda,p.nombreDoc,p.porPeso];})};
    }).filter(function(c){return c.items.length;});
  }
  return CARTA.map(function(c){return {cat:c.cat,pase:c.pase,color:c.color,items:c.items.map(function(it){return [it[0],it[1],it[2],c.pase,'d_'+it[0],c.cat,null,null,null];})};});
}
var DECOR={barra:{n:'Barra',ic:'🍸',w:240,h:64,c:'#a47148'},billar:{n:'Billar',ic:'🎱',w:180,h:100,c:'#2f7d4f'},planta:{n:'',ic:'🪴',w:54,h:54,c:'#e3efe0'},sofa:{n:'Sofá',ic:'🛋️',w:130,h:58,c:'#cdb89a'},aseo:{n:'Aseos',ic:'🚻',w:66,h:66,c:'#d7e3f1'}};
function formaDims(f){if(f==='redonda')return {w:114,h:114,r:'50%'};if(f==='rectangular')return {w:178,h:96,r:'14px'};if(f==='ovalada')return {w:178,h:104,r:'52% / 60%'};if(f==='barra')return {w:76,h:76,r:'50%'};return {w:120,h:106,r:'16px'};}
/* plano del SERVIDOR (salas con bg, mesas con x/y/forma, decor). null si no hay */
function getPLANO(){
  var m=Sync.master();
  if(m&&m.salas&&m.salas.length&&m.mesas&&m.mesas.length&&m.mesas.some(function(x){return x.x!=null;})){
    return {salas:m.salas,mesas:m.mesas,decor:m.decor||[]};
  }
  return null;
}
function mesasOcupadas(){ var o={}; (Sync.comandas()||[]).forEach(function(c){ o[c.mesa]=o[c.mesa]||{}; if(c.avisado)o[c.mesa].avisa=true; o[c.mesa].ocupada=true; }); return o; }
function salaDeMesa(nombre){ var m=Sync.master(); var mm=(m.mesas||[]).filter(function(x){return x.nombre===nombre;})[0]; return mm?mm.salaId:null; }
function _tfHorarioC(t){ if(!t.desde&&!t.hasta)return true; var d=new Date();var hm=('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); return hm>=(t.desde||'00:00')&&hm<=(t.hasta||'23:59'); }
function tarifaActivaC(){ var m=Sync.master(); var ts=(m.tarifas||[]).filter(function(t){return t.activa!==false&&_tfHorarioC(t);}); var sid=st.salaId;
  if(sid){ var s=ts.filter(function(t){return t.salaIds&&t.salaIds.indexOf(sid)>=0;}); if(s.length)return s[0]; }
  var d=ts.filter(function(t){return t.porDefecto&&(!t.salaIds||!t.salaIds.length);}); if(d.length)return d[0]; return null; }
function precioTarifaC(precio,id){ if(precio==null)return null; var t=tarifaActivaC(); if(!t)return precio; if(t.precios&&t.precios[id]!=null)return t.precios[id]; if(t.pct)return round2(precio*(1+t.pct/100)); return precio; }
function getSALAS(){
  var m=Sync.master();
  if(m&&m.salas&&m.salas.length&&m.mesas&&m.mesas.length){
    return m.salas.map(function(s){return {n:s.nombre,mesas:m.mesas.filter(function(x){return x.salaId===s.id;}).map(function(x){return x.nombre;})};}).filter(function(s){return s.mesas.length;});
  }
  return SALAS;
}
var st={view:'login',salaSel:0,catSel:0,mesa:null,lineas:[],ordenActivo:null};
var sel=null,pin='',avisosVistos={};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function toast(m,cls){var r=document.getElementById('toast');var d=document.createElement('div');d.className='toast '+(cls||'');d.innerHTML=m;r.appendChild(d);setTimeout(function(){d.remove();},cls==='av'?4500:2400);}
/* Aviso de jornada sin cerrar (lo abre/cierra el TPV; aquí solo se recuerda) */
function fechaFiscalC(){var d=new Date();if(d.getHours()<6)d.setDate(d.getDate()-1);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fmtFechaC(s){if(!s)return'';var p=String(s).split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):String(s);}
var EST=window.HOSTELERO_ESTACIONES;
function estCom(){ return EST?EST.actual('comandera'):null; }
function estacionComOk(){
  if(!EST) return true;
  var url=EST.fromUrl(); if(url) EST.set('comandera',url);
  var hay=EST.lista('comandera').length>0, saved=EST.get('comandera');
  if(hay && !saved){ showEstacionCom(); return false; }
  if(saved && saved!=='__all' && !EST.actual('comandera') && hay){ showEstacionCom(); return false; }
  return true;
}
function showEstacionCom(){
  var lista=EST?EST.lista('comandera'):[];
  var cards=lista.map(function(s){return '<button class="u" data-comest="'+esc(s.id)+'" style="min-width:140px"><span class="av" style="background:#0f766e">📱</span>'+esc(s.nombre)+'</button>';}).join('');
  app.innerHTML='<div class="center"><div class="lcard"><h2>📱 ¿Qué comandera es esta?</h2><p>Se recordará en este dispositivo</p><div class="users">'+(cards||'<p style="color:var(--soft)">No hay comanderas. Créalas en Administración → Estaciones.</p>')+'</div><button class="link" data-go="logout" style="margin-top:12px">← Salir</button></div></div>';
}
var _jorAviso=false;
function avisoJornada(){
  if(_jorAviso)return;
  if(!(Auth.sesion&&Auth.sesion()))return;
  var j=null;try{j=Sync.jornada&&Sync.jornada();}catch(e){}
  if(!(j&&j.abierta&&j.fecha&&j.fecha!==fechaFiscalC()))return;
  _jorAviso=true;
  var ov=document.createElement('div');ov.className='overlay';
  ov.innerHTML='<div class="sheet"><h3>⚠️ Jornada sin cerrar</h3>'
    +'<p style="color:#cbd5e1;font-size:14px;margin:0 0 6px">La jornada del <b>'+fmtFechaC(j.fecha)+'</b> sigue abierta y hoy es <b>'+fmtFechaC(fechaFiscalC())+'</b>.</p>'
    +'<p style="color:#94a3b8;font-size:13px;margin:0 0 14px">Recordad hacer el <b>cierre de caja en el TPV</b> antes de seguir trabajando.</p>'
    +'<button class="opt" data-cerrar style="justify-content:center">Entendido</button></div>';
  ov.addEventListener('click',function(e){if(e.target===ov||e.target.closest('[data-cerrar]'))ov.remove();});
  document.body.appendChild(ov);
}
function round2(n){return Math.round((n+Number.EPSILON)*100)/100;}
function eur(n){return (n==null?0:n).toFixed(2)+' €';}
function lineImp(l){var base=l.precio*l.cantidad;if(l.descLinea){if(l.descLinea.tipo==='pct')base-=base*(l.descLinea.valor||0)/100;else if(l.descLinea.tipo==='eur')base-=Math.min(base,l.descLinea.valor||0);}return round2(Math.max(0,base));}
function puedePrecio(){try{return Auth.permiso(me().rol,'descuento');}catch(e){return false;}}
function ini(n){return (n||'?').charAt(0).toUpperCase();}
function ordColor(n){return ORD[n]||'#64748b';}
function oi(n){var i=ORDLIST.indexOf(n);return i<0?99:i;}
function me(){return Auth.sesion();}

/* login */
function showLogin(){st.view='login';
  var us=Auth.usuarios().filter(function(u){return Auth.puedeAbrir(u.rol,'movil');}).map(function(u){var ri=Auth.rolInfo(u.rol);
    return '<button class="u" data-id="'+u.id+'"><span class="av" style="background:'+(u.color||ri.color)+'">'+ini(u.nombre)+'</span>'+esc(u.nombre)+'</button>';});
  app.innerHTML='<div class="center"><div class="lcard"><h2>📋 Comandera</h2><p>Identifícate para tomar comandas</p><div class="users">'+us.join('')+'</div></div></div>';
}
function showPin(u){sel=u;pin='';var ri=Auth.rolInfo(u.rol);
  var keys=['1','2','3','4','5','6','7','8','9','b','0','ok'];
  var kp=keys.map(function(k){return k==='b'?'<button data-k="back">⌫</button>':k==='ok'?'<button data-k="ok">OK</button>':'<button data-k="'+k+'">'+k+'</button>';}).join('');
  app.innerHTML='<div class="center"><div class="lcard" id="pw"><span class="av" style="margin:0 auto;background:'+(u.color||ri.color)+'">'+ini(u.nombre)+'</span><h2 style="margin-top:10px">'+esc(u.nombre)+'</h2><p>Tu PIN</p><div class="dots" id="dots"></div><div class="kp">'+kp+'</div><button class="link" data-k="atras">← Cambiar</button></div></div>';
  dots();
}
function dots(){var d=document.getElementById('dots');if(d){var s='';for(var i=0;i<4;i++)s+='<span class="d'+(i<pin.length?' on':'')+'"></span>';d.innerHTML=s;}}

function addProd(ix){

    var pw=prompt('Peso de '+(it[6]||it[0])+' en kg (ej. 0,750):',''); if(pw===null)return;
    var kg=parseFloat(String(pw).replace(',','.')); if(isNaN(kg)||kg<=0){toast('Peso no válido');return;}
    var pk=it[2];if(pk==null){var py=prompt('Precio por kg (€):','');if(py===null)return;pk=parseFloat(String(py).replace(',','.'))||0;}
    st.lineas.push({nombre:nombreCom+' ('+kg.toFixed(3)+' kg)',nombreDoc:(it[8]||nombreCom)+' ('+kg.toFixed(3)+' kg)',ic:it[1],precio:round2(pk*kg),peso:kg,cantidad:1,orden:orden,productId:it[4],catId:it[5]});

/* ---- mover y unir mesas (pulsación larga, compatible con el zoom del plano) ---- */
var planoScale=1, pdrag=null, pSuppress=false;
function nombreGrupo(nombre){var m=Sync.master();var me=(m.mesas||[]).filter(function(z){return z.nombre===nombre;})[0];if(!me)return nombre;var root=me.grupo?((m.mesas||[]).filter(function(z){return z.id===me.grupo;})[0]||me):me;var subs=(m.mesas||[]).filter(function(z){return z.grupo===root.id;});return root.nombre+(subs.length?('+'+subs.map(function(z){return z.nombre;}).join('+')):'');}
function cDown(e){
  pSuppress=false;
  if(st.view!=='mesas')return;
  var el=e.target.closest('.pmesa[data-mid]');if(!el)return;
  var plano=document.querySelector('.plano');if(!plano)return;
  var pr=plano.getBoundingClientRect(),mr=el.getBoundingClientRect();
  pdrag={el:el,mid:el.dataset.mid,pr:pr,dx:(e.clientX-mr.left)/planoScale,dy:(e.clientY-mr.top)/planoScale,x0:e.clientX,y0:e.clientY,moved:false,armed:false,timer:null};
  pdrag.timer=setTimeout(function(){if(pdrag&&!pdrag.moved){pdrag.armed=true;pdrag.el.classList.add('drag');if(navigator.vibrate)try{navigator.vibrate(15);}catch(_){}}},360);
}
function cMove(e){
  if(!pdrag)return;
  if(!pdrag.moved&&(Math.abs(e.clientX-pdrag.x0)>7||Math.abs(e.clientY-pdrag.y0)>7)){pdrag.moved=true;if(!pdrag.armed){clearTimeout(pdrag.timer);pdrag=null;return;}}
  if(!pdrag.armed)return;e.preventDefault();
  var x=Math.max(0,(e.clientX-pdrag.pr.left)/planoScale-pdrag.dx),y=Math.max(0,(e.clientY-pdrag.pr.top)/planoScale-pdrag.dy);
  pdrag.el.style.left=Math.round(x)+'px';pdrag.el.style.top=Math.round(y)+'px';
  var t=overMesa(x,y,pdrag.mid);
  Array.prototype.forEach.call(document.querySelectorAll('.pmesa.tgt'),function(z){z.classList.remove('tgt');});
  if(t){var te=document.querySelector('.pmesa[data-mid="'+t+'"]');if(te)te.classList.add('tgt');}
}
function overMesa(x,y,selfId){
  var m=Sync.master(),me=(m.mesas||[]).filter(function(z){return z.id===selfId;})[0];if(!me)return null;
  var fd=formaDims(me.forma),cx=x+fd.w/2,cy=y+fd.h/2;
  var hit=(m.mesas||[]).filter(function(o){if(o.id===selfId||o.salaId!==me.salaId)return false;var of=formaDims(o.forma);return cx>=o.x&&cx<=o.x+of.w&&cy>=o.y&&cy<=o.y+of.h;})[0];
  return hit?hit.id:null;
}
function cUp(){
  if(!pdrag)return;if(pdrag.timer)clearTimeout(pdrag.timer);
  var d=pdrag;pdrag=null;
  Array.prototype.forEach.call(document.querySelectorAll('.pmesa.tgt'),function(z){z.classList.remove('tgt');});
  if(d.el)d.el.classList.remove('drag');
  if(!d.armed){return;}
  pSuppress=true;
  if(!d.moved){
    var ms=JSON.parse(JSON.stringify(Sync.master()));
    var mz=(ms.mesas||[]).filter(function(z){return z.id===d.mid;})[0];if(!mz)return;
    var esRaiz=(ms.mesas||[]).some(function(z){return z.grupo===mz.id;});
    if(mz.grupo||esRaiz){
      if(confirm('¿Separar '+mz.nombre+' del grupo? Volverá a ser una mesa independiente.')){
        if(mz.grupo){mz.grupo=null;}
        else{(ms.mesas||[]).forEach(function(z){if(z.grupo===mz.id)z.grupo=null;});}
        try{Sync.guardarMaster(ms);}catch(_){}
      }
    }
    return;
  }
  var x=parseInt(d.el.style.left,10)||0,y=parseInt(d.el.style.top,10)||0;
  var mm=JSON.parse(JSON.stringify(Sync.master()));
  var me=(mm.mesas||[]).filter(function(z){return z.id===d.mid;})[0];if(!me)return;
  me.x=x;me.y=y;
  var tid=overMesa(x,y,d.mid);
  if(tid){
    var tgt=(mm.mesas||[]).filter(function(z){return z.id===tid;})[0];
    var yaUnida=(me.grupo===tid)||(tgt&&tgt.grupo===me.id);
    if(tgt&&!yaUnida){
      if(confirm('¿Unir '+me.nombre+' con '+tgt.nombre+'? Trabajarán como una sola mesa, con una sola comanda.')){
        var root=tgt.grupo?((mm.mesas||[]).filter(function(z){return z.id===tgt.grupo;})[0]||tgt):tgt;
        me.grupo=root.id;var rf=formaDims(root.forma);me.x=root.x+rf.w-20;me.y=root.y+14;
      }
    }
  }
  try{Sync.guardarMaster(mm);}catch(_){}
}
document.addEventListener('pointerdown',cDown,{passive:true});
document.addEventListener('pointermove',cMove,{passive:false});
document.addEventListener('pointerup',cUp);
document.addEventListener('pointercancel',cUp);

document.addEventListener('click',function(e){
  if(pSuppress){pSuppress=false;e.preventDefault();e.stopPropagation();return;}
  var ce=e.target.closest('[data-comest]');if(ce){ if(EST)EST.set('comandera',ce.dataset.comest); if(estacionComOk()){ showMesas(); avisoJornada(); } return; }
  var u=e.target.closest('.u');if(u){var us=Auth.usuarios().filter(function(x){return x.id===u.dataset.id;})[0];if(us)showPin(us);return;}
  var k=e.target.closest('[data-k]');if(k){pk(k.dataset.k);return;}
  var sa=e.target.closest('[data-sala]');if(sa){st.salaSel=+sa.dataset.sala;showMesas();return;}
  var ms=e.target.closest('[data-mesa]');if(ms){st.mesa=nombreGrupo(ms.dataset.mesa);st.salaId=salaDeMesa(ms.dataset.mesa);st.lineas=[];st.ordenActivo=null;st.catSel=0;showComanda();return;}
  var ct=e.target.closest('[data-cat]');if(ct){st.catSel=+ct.dataset.cat;showComanda();return;}
  var ad=e.target.closest('[data-add]');if(ad){addProd(+ad.dataset.add);return;}
  var ln=e.target.closest('[data-line]');if(ln){lineaSheet(+ln.dataset.line);return;}
  var mn=e.target.closest('[data-menos]');if(mn){var i=+mn.dataset.menos;st.lineas[i].cantidad--;if(st.lineas[i].cantidad<=0)st.lineas.splice(i,1);showComanda();return;}
  var mp=e.target.closest('[data-mas]');if(mp){st.lineas[+mp.dataset.mas].cantidad++;showComanda();return;}
  var g=e.target.closest('[data-go]');if(g){var go=g.dataset.go;
    if(go==='logout'){Auth.logout();showLogin();}
    else if(go==='cambiarcom'){ if(EST)EST.clear('comandera'); showEstacionCom(); }
    else if(go==='mesas')showMesas();
    else if(go==='disp')dispSheet();
    else if(go==='orden123')modal123();
    else if(go==='ordendef'){st.ordenActivo=null;showComanda();}
    else if(go==='enviar')enviar();
    return;}
});
if(Auth.sesion()&&Auth.puedeAbrir(Auth.sesion().rol,'movil')){ showMesas(); avisoJornada(); } else showLogin();
</script>
